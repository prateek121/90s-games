<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLASMA COLLECTOR - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, monospace;
            background: linear-gradient(135deg, #3d1a52 0%, #2d0f3d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        canvas#gameCanvas {
            border: 3px solid #ff33ff;
            background: #000;
            display: block;
            box-shadow: 0 0 30px rgba(255, 51, 255, 0.6);
        }
        .info {
            color: #ff33ff;
            min-width: 250px;
        }
        .stat-box {
            background: rgba(255, 51, 255, 0.1);
            border: 2px solid #ff33ff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0;
        }
        .stat-label { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; letter-spacing: 2px; }
        .stat-value { font-size: 28px; font-family: monospace; font-weight: bold; }
        button {
            width: 100%;
            padding: 10px;
            background: #ff33ff;
            color: #000;
            border: 2px solid #ff33ff;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            font-family: monospace;
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 51, 255, 0.8); }
        .controls {
            background: rgba(255, 51, 255, 0.1);
            border: 2px solid #ff33ff;
            padding: 12px;
            font-size: 10px;
            font-family: monospace;
            line-height: 1.8;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="480" height="480"></canvas>
        <div class="info">
            <div class="stat-box">
                <div class="stat-label">Collected</div>
                <div class="stat-value" id="collected">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
            <div class="controls">
                <strong>CONTROLS:</strong><br/>
                MOUSE Move collector<br/>
                Collect plasma orbs<br/>
                Avoid negatives!
            </div>
            <button onclick="game.start()">START</button>
            <button onclick="game.restart()">RESET</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 480,
            height: 480,

            collector: { x: 240, y: 240, radius: 25, color: '#ff33ff' },
            particles: [],
            positive: [],
            negative: [],
            collected: 0,
            score: 0,
            gameRunning: false,
            gameOver: false,
            best: localStorage.getItem('plasmaCollectorBest') || 0,
            mouseX: 240,
            mouseY: 240,
            spawnCounter: 0,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.canvas.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    this.mouseX = e.clientX - rect.left;
                    this.mouseY = e.clientY - rect.top;
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === ' ' && !this.gameRunning && !this.gameOver) {
                        this.start();
                    }
                });
                this.gameLoop();
            },

            start() {
                if (!this.gameRunning && !this.gameOver) {
                    this.gameRunning = true;
                }
            },

            spawnParticle(x, y, type) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 1;
                this.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 30,
                    radius: 5,
                    color: type === 'positive' ? '#ff33ff' : '#ff0000'
                });
            },

            update() {
                if (!this.gameRunning || this.gameOver) return;

                // Move collector toward mouse
                const dx = this.mouseX - this.collector.x;
                const dy = this.mouseY - this.collector.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 5) {
                    this.collector.x += dx / dist * 4;
                    this.collector.y += dy / dist * 4;
                }

                // Spawn positive particles
                this.spawnCounter++;
                if (this.spawnCounter % 20 === 0) {
                    this.positive.push({
                        x: Math.random() * this.width,
                        y: Math.random() * this.height,
                        radius: 8,
                        vx: (Math.random() - 0.5) * 1,
                        vy: (Math.random() - 0.5) * 1,
                        color: '#ff33ff'
                    });
                }

                // Spawn negative particles
                if (this.spawnCounter % 40 === 0) {
                    this.negative.push({
                        x: Math.random() * this.width,
                        y: Math.random() * this.height,
                        radius: 8,
                        vx: (Math.random() - 0.5) * 1,
                        vy: (Math.random() - 0.5) * 1,
                        color: '#ff0000'
                    });
                }

                // Update positive particles
                this.positive = this.positive.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;

                    // Wrap around
                    if (p.x < 0) p.x = this.width;
                    if (p.x > this.width) p.x = 0;
                    if (p.y < 0) p.y = this.height;
                    if (p.y > this.height) p.y = 0;

                    // Check collision with collector
                    const pdx = p.x - this.collector.x;
                    const pdy = p.y - this.collector.y;
                    const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                    if (pdist < this.collector.radius + p.radius) {
                        this.spawnParticle(p.x, p.y, 'positive');
                        this.collected++;
                        this.score += 10;
                        return false;
                    }
                    return true;
                });

                // Update negative particles
                this.negative = this.negative.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;

                    // Wrap around
                    if (p.x < 0) p.x = this.width;
                    if (p.x > this.width) p.x = 0;
                    if (p.y < 0) p.y = this.height;
                    if (p.y > this.height) p.y = 0;

                    // Check collision with collector
                    const pdx = p.x - this.collector.x;
                    const pdy = p.y - this.collector.y;
                    const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                    if (pdist < this.collector.radius + p.radius) {
                        this.gameOver = true;
                        this.gameRunning = false;
                    }
                    return true;
                });

                // Update particles
                this.particles = this.particles.filter(p => {
                    p.life--;
                    p.x += p.vx;
                    p.y += p.vy;
                    return p.life > 0;
                });

                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('plasmaCollectorBest', this.best);
                }
            },

            draw() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Draw positive particles
                for (let p of this.positive) {
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#fff';
                    this.ctx.lineWidth = 1;
                    this.ctx.stroke();
                }

                // Draw negative particles
                for (let p of this.negative) {
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#fff';
                    this.ctx.lineWidth = 1;
                    this.ctx.stroke();
                }

                // Draw collector
                this.ctx.fillStyle = this.collector.color;
                this.ctx.beginPath();
                this.ctx.arc(this.collector.x, this.collector.y, this.collector.radius, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 3;
                this.ctx.stroke();

                // Draw particles
                for (let p of this.particles) {
                    this.ctx.fillStyle = `rgba(${p.color === '#ff33ff' ? '255, 51, 255' : '255, 0, 0'}, ${p.life / 30})`;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    this.ctx.fill();
                }

                // HUD
                this.ctx.fillStyle = '#ff33ff';
                this.ctx.font = 'bold 14px monospace';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`COLLECTED: ${this.collected}`, 10, 25);
                this.ctx.fillText(`SCORE: ${this.score}`, 10, 50);

                if (this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#ff33ff';
                    this.ctx.font = 'bold 24px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('COLLISION!', this.width / 2, this.height / 2);
                }

                document.getElementById('collected').textContent = this.collected;
                document.getElementById('score').textContent = this.score;
                document.getElementById('best').textContent = this.best;
            },

            restart() {
                this.collector = { x: 240, y: 240, radius: 25, color: '#ff33ff' };
                this.particles = [];
                this.positive = [];
                this.negative = [];
                this.collected = 0;
                this.score = 0;
                this.gameRunning = false;
                this.gameOver = false;
                this.spawnCounter = 0;
                this.draw();
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
