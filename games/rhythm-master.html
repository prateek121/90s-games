<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Master - Action Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a3a 0%, #3a1a2a 100%);
            font-family: 'Arial', sans-serif;
            color: #ff00ff;
            overflow: hidden;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            text-align: center;
            text-shadow: 0 0 15px #ff00ff;
            border: 3px solid #ff00ff;
            padding: 15px 30px;
            background: rgba(255, 0, 255, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 1.2em;
        }

        .stat {
            border: 2px solid #ff00ff;
            padding: 10px 20px;
            background: rgba(255, 0, 255, 0.05);
        }

        .stat span {
            color: #00ffff;
            font-weight: bold;
        }

        #canvas {
            border: 4px solid #ff00ff;
            background: #000;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.4);
        }

        .message {
            min-height: 25px;
            font-size: 1.3em;
            text-shadow: 0 0 10px currentColor;
        }

        .message.perfect {
            color: #00ff00;
        }

        .message.good {
            color: #ffff00;
        }

        .message.ok {
            color: #00ffff;
        }

        .message.bad {
            color: #ff4444;
        }

        .controls {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #ff00ff, #ff0088);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .instruction {
            text-align: center;
            color: #ff00ff;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="header">
            <h1>RHYTHM MASTER</h1>
        </div>
        <div class="stats">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Combo: <span id="combo">0</span></div>
            <div class="stat">Accuracy: <span id="accuracy">0</span>%</div>
        </div>
        <div class="instruction">Press ASDF keys to hit the notes on beat!</div>
        <canvas id="canvas" width="800" height="500"></canvas>
        <div class="message" id="message"></div>
        <div class="controls">
            <button onclick="game.reset()">New Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        class Note {
            constructor(lane, time) {
                this.lane = lane; // 0-3
                this.time = time;
                this.hit = false;
                this.missed = false;
                this.y = 0;
                this.speed = 4;
            }

            update() {
                this.y += this.speed;
            }

            draw(ctx, currentTime) {
                const laneWidth = 150;
                const laneX = 50 + this.lane * laneWidth;

                if (!this.hit && !this.missed) {
                    ctx.fillStyle = ['#ff0000', '#00ff00', '#0088ff', '#ffff00'][this.lane];
                    ctx.globalAlpha = 0.8;
                    ctx.fillRect(laneX, this.y, 100, 40);
                    ctx.globalAlpha = 1;

                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(laneX, this.y, 100, 40);
                }
            }

            isOffScreen() {
                return this.y > canvas.height;
            }
        }

        class RhythmMaster {
            constructor() {
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.gameActive = true;
                this.notes = [];
                this.currentTime = 0;
                this.bpm = 120;
                this.beatDuration = 60000 / this.bpm;
                this.hitZoneY = 450;
                this.hitZoneHeight = 40;
                this.totalNotes = 0;
                this.correctHits = 0;

                this.generateNotes();
                this.setupEventListeners();
            }

            generateNotes() {
                this.notes = [];
                let time = 2000;
                const patterns = [
                    [0, 1, 2, 3],
                    [0, 0, 1, 1, 2, 2, 3, 3],
                    [0, 2, 1, 3, 0, 2, 1, 3],
                    [3, 2, 1, 0],
                    [0, 1, 0, 2, 0, 3]
                ];

                while (time < 30000) {
                    const pattern = patterns[Math.floor(Math.random() * patterns.length)];
                    const beatDuration = this.beatDuration;

                    for (let lane of pattern) {
                        this.notes.push(new Note(lane, time));
                        this.totalNotes++;
                        time += beatDuration / 2;
                    }
                    time += beatDuration;
                }
            }

            setupEventListeners() {
                const keyMap = { 'a': 0, 's': 1, 'd': 2, 'f': 3 };

                window.addEventListener('keydown', (e) => {
                    if (!this.gameActive) return;
                    const lane = keyMap[e.key.toLowerCase()];
                    if (lane !== undefined) {
                        this.handleKeyPress(lane);
                    }
                });
            }

            handleKeyPress(lane) {
                let hitNote = null;
                let minDistance = Infinity;

                for (let note of this.notes) {
                    if (note.lane === lane && !note.hit && !note.missed) {
                        const distance = Math.abs(note.y - this.hitZoneY);
                        if (distance < minDistance && distance < 80) {
                            minDistance = distance;
                            hitNote = note;
                        }
                    }
                }

                if (hitNote) {
                    hitNote.hit = true;
                    this.combo++;
                    this.maxCombo = Math.max(this.maxCombo, this.combo);
                    this.correctHits++;

                    let rating = 'PERFECT';
                    let points = 100;
                    let messageClass = 'perfect';

                    if (minDistance < 15) {
                        rating = 'PERFECT';
                        points = 100;
                        messageClass = 'perfect';
                    } else if (minDistance < 35) {
                        rating = 'GOOD';
                        points = 75;
                        messageClass = 'good';
                    } else if (minDistance < 60) {
                        rating = 'OK';
                        points = 50;
                        messageClass = 'ok';
                    } else {
                        rating = 'BAD';
                        points = 25;
                        messageClass = 'bad';
                    }

                    this.score += points + (this.combo * 5);

                    document.getElementById('message').textContent = rating;
                    document.getElementById('message').className = 'message ' + messageClass;
                } else {
                    this.combo = 0;
                    document.getElementById('message').textContent = 'MISS!';
                    document.getElementById('message').className = 'message bad';
                }
            }

            update() {
                if (!this.gameActive) return;

                this.currentTime += 16.67;

                // Update and remove notes
                this.notes = this.notes.filter(note => {
                    note.update();
                    if (!note.hit && !note.missed) {
                        if (note.y > this.hitZoneY + 100) {
                            note.missed = true;
                            this.combo = 0;
                        }
                    }
                    return !note.isOffScreen();
                });

                // Check if song is over
                if (this.notes.length === 0 && this.currentTime > 30000) {
                    this.endGame();
                }
            }

            endGame() {
                this.gameActive = false;
                const accuracy = this.totalNotes > 0 ? Math.round((this.correctHits / this.totalNotes) * 100) : 0;
                document.getElementById('message').textContent =
                    `Song Complete! Score: ${this.score} | Accuracy: ${accuracy}%`;
                document.getElementById('message').className = 'message perfect';
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('combo').textContent = this.combo;
                const accuracy = this.totalNotes > 0 ? Math.round((this.correctHits / this.totalNotes) * 100) : 0;
                document.getElementById('accuracy').textContent = accuracy;
            }

            draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const laneWidth = 150;

                // Draw lanes
                for (let i = 0; i < 4; i++) {
                    const x = 50 + i * laneWidth;
                    ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, 0, 100, canvas.height);
                }

                // Draw hit zone
                ctx.fillStyle = 'rgba(255, 255, 0, 0.2)';
                ctx.fillRect(0, this.hitZoneY - 20, canvas.width, this.hitZoneHeight + 40);

                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, this.hitZoneY);
                ctx.lineTo(canvas.width, this.hitZoneY);
                ctx.stroke();

                // Draw notes
                for (let note of this.notes) {
                    note.draw(ctx, this.currentTime);
                }

                // Draw lane labels
                const labels = ['A', 'S', 'D', 'F'];
                ctx.fillStyle = '#ff00ff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                for (let i = 0; i < 4; i++) {
                    const x = 50 + i * laneWidth + 50;
                    ctx.fillText(labels[i], x, 10);
                }

                this.updateUI();
            }

            animate() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.animate());
            }

            reset() {
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.gameActive = true;
                this.currentTime = 0;
                this.correctHits = 0;
                this.totalNotes = 0;
                document.getElementById('message').textContent = '';
                this.generateNotes();
            }
        }

        const game = new RhythmMaster();
        game.animate();

        function saveHighScore() {
            const existing = parseInt(localStorage.getItem('rhythmMasterHighScore') || '0');
            if (game.score > existing) {
                localStorage.setItem('rhythmMasterHighScore', game.score);
            }
        }

        window.addEventListener('beforeunload', saveHighScore);
    </script>
</body>
</html>
