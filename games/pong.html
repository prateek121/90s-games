<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONG - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        canvas#gameCanvas {
            border: 4px solid #00ffff;
            background: #000;
            display: block;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        .sidebar {
            color: white;
            min-width: 250px;
        }
        .score-display {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
            text-align: center;
        }
        .player-score {
            font-size: 36px;
            font-weight: bold;
            color: #00ffff;
            margin: 10px 0;
        }
        .controls-box {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.8;
        }
        .mode-select {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .mode-btn {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #00ffff;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
            transition: all 0.3s;
        }
        .mode-btn:hover { transform: scale(1.05); }
        .mode-btn.active { background: #ff00ff; color: #fff; }
        button {
            width: 100%;
            padding: 10px;
            background: #00ffff;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            border-radius: 3px;
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.05); background: #ff00ff; color: #fff; }
        .stats {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            padding: 15px;
            border-radius: 4px;
            font-size: 12px;
        }
        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            color: #ccc;
        }
        .stat-label { color: #00ffff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="sidebar">
            <div class="score-display">
                <div style="font-size: 14px; color: #00ffff; margin-bottom: 10px;">PLAYER 1 vs AI</div>
                <div style="display: flex; justify-content: space-around;">
                    <div>
                        <div style="font-size: 12px; color: #00ffff;">YOU</div>
                        <div class="player-score" id="p1Score">0</div>
                    </div>
                    <div style="font-size: 24px; color: #00ffff;">:</div>
                    <div>
                        <div style="font-size: 12px; color: #00ffff;">AI</div>
                        <div class="player-score" id="p2Score">0</div>
                    </div>
                </div>
            </div>

            <div class="controls-box">
                <strong>CONTROLS:</strong>
                <p>W - Paddle Up</p>
                <p>S - Paddle Down</p>
                <p>SPACE - Start Ball</p>
                <p>P - Pause</p>
            </div>

            <div class="mode-select">
                <div style="color: #00ffff; font-weight: bold; margin-bottom: 10px;">GAME MODE</div>
                <button class="mode-btn active" onclick="game.setMode('ai')">vs AI</button>
                <button class="mode-btn" onclick="game.setMode('2player')">2 Player</button>
                <button class="mode-btn" onclick="game.setMode('rally')">Rally Mode</button>
            </div>

            <button onclick="game.startBall()">START GAME</button>
            <button onclick="game.restart()">NEW GAME</button>
            <button onclick="location.href='../'">BACK</button>

            <div class="stats">
                <div class="stat-line">
                    <span class="stat-label">Ball Speed:</span>
                    <span id="ballSpeed">2.0x</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">Rally Count:</span>
                    <span id="rally">0</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">Longest Rally:</span>
                    <span id="longest">0</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">Total Points:</span>
                    <span id="totalPoints">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 800,
            height: 400,
            paddleWidth: 10,
            paddleHeight: 80,
            ballSize: 6,

            p1: { x: 20, y: 160 },
            p2: { x: 770, y: 160 },
            ball: { x: 400, y: 200, vx: 0, vy: 0 },

            p1Score: 0,
            p2Score: 0,
            rallies: 0,
            currentRally: 0,
            longestRally: 0,
            ballSpeedMultiplier: 1,
            mode: 'ai',
            gameRunning: false,
            gamePaused: false,
            ballStarted: false,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.gameLoop();
            },

            setMode(mode) {
                this.mode = mode;
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                this.restart();
            },

            restart() {
                this.p1Score = 0;
                this.p2Score = 0;
                this.rallies = 0;
                this.currentRally = 0;
                this.longestRally = 0;
                this.ballSpeedMultiplier = 1;
                this.ballStarted = false;
                this.gameRunning = false;
                this.gamePaused = false;
                this.resetBall();
                this.draw();
            },

            resetBall() {
                this.ball.x = this.width / 2;
                this.ball.y = this.height / 2;
                this.ball.vx = 0;
                this.ball.vy = 0;
                this.currentRally = 0;
            },

            startBall() {
                if (!this.ballStarted) {
                    this.ballStarted = true;
                    this.gameRunning = true;
                    this.ball.vx = (Math.random() > 0.5 ? 1 : -1) * 4 * this.ballSpeedMultiplier;
                    this.ball.vy = (Math.random() - 0.5) * 3 * this.ballSpeedMultiplier;
                }
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                // Update ball
                this.ball.x += this.ball.vx;
                this.ball.y += this.ball.vy;

                // Ball collision with top/bottom
                if (this.ball.y - this.ballSize < 0 || this.ball.y + this.ballSize > this.height) {
                    this.ball.vy = -this.ball.vy;
                    this.ball.y = Math.max(this.ballSize, Math.min(this.height - this.ballSize, this.ball.y));
                }

                // Ball collision with left paddle
                if (this.ball.x - this.ballSize < this.p1.x + this.paddleWidth &&
                    this.ball.y > this.p1.y && this.ball.y < this.p1.y + this.paddleHeight) {
                    this.ball.vx = -this.ball.vx;
                    this.ball.x = this.p1.x + this.paddleWidth + this.ballSize;
                    const collidePoint = this.ball.y - (this.p1.y + this.paddleHeight / 2);
                    this.ball.vy = (collidePoint / (this.paddleHeight / 2)) * 5 * this.ballSpeedMultiplier;
                    this.currentRally++;
                    if (this.currentRally > this.longestRally) this.longestRally = this.currentRally;
                }

                // Ball collision with right paddle
                if (this.ball.x + this.ballSize > this.p2.x &&
                    this.ball.y > this.p2.y && this.ball.y < this.p2.y + this.paddleHeight) {
                    this.ball.vx = -this.ball.vx;
                    this.ball.x = this.p2.x - this.ballSize;
                    const collidePoint = this.ball.y - (this.p2.y + this.paddleHeight / 2);
                    this.ball.vy = (collidePoint / (this.paddleHeight / 2)) * 5 * this.ballSpeedMultiplier;
                    this.currentRally++;
                    if (this.currentRally > this.longestRally) this.longestRally = this.currentRally;
                }

                // Score
                if (this.ball.x < 0) {
                    this.p2Score++;
                    this.ballSpeedMultiplier = 1 + (this.p2Score + this.p1Score) * 0.05;
                    this.currentRally = 0;
                    this.resetBall();
                    this.ballStarted = false;
                    this.gameRunning = false;
                }
                if (this.ball.x > this.width) {
                    this.p1Score++;
                    this.ballSpeedMultiplier = 1 + (this.p2Score + this.p1Score) * 0.05;
                    this.currentRally = 0;
                    this.resetBall();
                    this.ballStarted = false;
                    this.gameRunning = false;
                }

                // AI for left paddle (basic)
                if (this.mode === 'ai' && this.gameRunning) {
                    const paddleCenter = this.p2.y + this.paddleHeight / 2;
                    if (paddleCenter < this.ball.y - 10) {
                        this.p2.y = Math.min(this.height - this.paddleHeight, this.p2.y + 3);
                    } else if (paddleCenter > this.ball.y + 10) {
                        this.p2.y = Math.max(0, this.p2.y - 3);
                    }
                }
            },

            draw() {
                // Background
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Center line
                this.ctx.strokeStyle = '#00ffff';
                this.ctx.setLineDash([5, 5]);
                this.ctx.beginPath();
                this.ctx.moveTo(this.width / 2, 0);
                this.ctx.lineTo(this.width / 2, this.height);
                this.ctx.stroke();
                this.ctx.setLineDash([]);

                // Paddles
                this.ctx.fillStyle = '#00ffff';
                this.ctx.fillRect(this.p1.x, this.p1.y, this.paddleWidth, this.paddleHeight);
                this.ctx.fillRect(this.p2.x, this.p2.y, this.paddleWidth, this.paddleHeight);

                // Ball
                this.ctx.fillStyle = '#ff00ff';
                this.ctx.beginPath();
                this.ctx.arc(this.ball.x, this.ball.y, this.ballSize, 0, Math.PI * 2);
                this.ctx.fill();

                // Score
                this.ctx.fillStyle = '#00ffff';
                this.ctx.font = 'bold 40px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText(this.p1Score, this.width / 4, 50);
                this.ctx.fillText(this.p2Score, (this.width * 3) / 4, 50);

                // Pause overlay
                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#00ffff';
                    this.ctx.font = 'bold 30px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }

                // Update stats
                document.getElementById('p1Score').textContent = this.p1Score;
                document.getElementById('p2Score').textContent = this.p2Score;
                document.getElementById('rally').textContent = this.currentRally;
                document.getElementById('longest').textContent = this.longestRally;
                document.getElementById('ballSpeed').textContent = this.ballSpeedMultiplier.toFixed(1) + 'x';
                document.getElementById('totalPoints').textContent = this.p1Score + this.p2Score;
            },

            setupInput() {
                const keys = {};
                document.addEventListener('keydown', (e) => {
                    keys[e.key.toLowerCase()] = true;
                    if (e.key === ' ') {
                        this.startBall();
                        e.preventDefault();
                    }
                    if (e.key.toLowerCase() === 'p') {
                        if (this.gameRunning) this.gamePaused = !this.gamePaused;
                    }
                });

                document.addEventListener('keyup', (e) => {
                    keys[e.key.toLowerCase()] = false;
                });

                const updatePaddlePosition = () => {
                    if (keys['w']) this.p1.y = Math.max(0, this.p1.y - 5);
                    if (keys['s']) this.p1.y = Math.min(this.height - this.paddleHeight, this.p1.y + 5);
                    if (this.mode === '2player') {
                        if (keys['arrowup']) this.p2.y = Math.max(0, this.p2.y - 5);
                        if (keys['arrowdown']) this.p2.y = Math.min(this.height - this.paddleHeight, this.p2.y + 5);
                    }
                };

                setInterval(updatePaddlePosition, 20);
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
