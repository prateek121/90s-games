<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Guardian - 90s Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a5f3f, #2d8659);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            border: 3px solid #fff;
            background: linear-gradient(to bottom, #87ceeb 0%, #90ee90 50%, #228b22 100%);
            display: block;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            cursor: crosshair;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .stat {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 5px;
            border: 2px solid #4cd964;
        }

        .controls {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            border: 2px solid #4cd964;
        }

        button {
            background: #4cd964;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #5cff74;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            border: 3px solid #4cd964;
        }

        .game-over h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #4cd964;
        }

        .game-over p {
            font-size: 1.3em;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌲 Forest Guardian 🌲</h1>
        <div class="stats">
            <div class="stat">Health: <span id="health">5</span></div>
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Wave: <span id="wave">1</span></div>
            <div class="stat">Trees Saved: <span id="treesaved">0</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="controls">
            <button onclick="togglePause()">Pause</button>
            <button onclick="restartGame()">Restart</button>
            <button onclick="goHome()">Home</button>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Trees Saved: <span id="finalTrees">0</span></p>
        <p>Wave Reached: <span id="finalWave">1</span></p>
        <button onclick="restartGame()" style="margin-top: 20px;">Play Again</button>
        <button onclick="goHome()" style="margin-top: 20px;">Home</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const game = {
            health: 5,
            score: 0,
            wave: 1,
            treesSaved: 0,
            isPaused: false,
            gameOver: false,
            mouseX: 0,
            mouseY: 0
        };

        class Tree {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.health = 3;
                this.width = 40;
                this.height = 60;
            }

            draw() {
                ctx.fillStyle = '#228b22';
                ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                ctx.fillStyle = '#2d8659';
                ctx.beginPath();
                ctx.arc(this.x - this.width / 4, this.y - this.height / 2 - 15, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + this.width / 4, this.y - this.height / 2 - 15, 15, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = `hsl(120, 100%, ${Math.max(30, 60 - (3 - this.health) * 10)}%)`;
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.health, this.x, this.y + 10);
            }

            takeDamage() {
                this.health--;
                return this.health <= 0;
            }
        }

        class Enemy {
            constructor(x, y, speed) {
                this.x = x;
                this.y = y;
                this.vx = speed;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = 15;
                this.health = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                this.y = Math.max(0, Math.min(canvas.height, this.y));
            }

            draw() {
                ctx.fillStyle = '#8B0000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 3, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + 5, this.y - 3, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            isCollidingWith(tree) {
                const dx = this.x - tree.x;
                const dy = this.y - tree.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size + tree.width / 2;
            }
        }

        class Projectile {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                const angle = Math.atan2(targetY - y, targetX - x);
                this.vx = Math.cos(angle) * 8;
                this.vy = Math.sin(angle) * 8;
                this.size = 8;
                this.life = 60;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }

            draw() {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            isActive() {
                return this.life > 0 && this.x >= 0 && this.x <= canvas.width && this.y >= 0 && this.y <= canvas.height;
            }
        }

        let trees = [];
        let enemies = [];
        let projectiles = [];

        function initGame() {
            trees = [];
            enemies = [];
            projectiles = [];
            game.health = 5;
            game.score = 0;
            game.wave = 1;
            game.treesSaved = 0;
            game.gameOver = false;
            game.isPaused = false;

            for (let i = 0; i < 3; i++) {
                trees.push(new Tree(150 + i * 250, 250));
            }

            spawnWave();
        }

        function spawnWave() {
            const enemyCount = 3 + game.wave;
            const speed = 1 + game.wave * 0.5;

            for (let i = 0; i < enemyCount; i++) {
                setTimeout(() => {
                    enemies.push(new Enemy(canvas.width - 50, Math.random() * canvas.height, -speed));
                }, i * 300);
            }
        }

        function update() {
            if (game.gameOver || game.isPaused) return;

            enemies.forEach((enemy, eIdx) => {
                enemy.update();

                if (enemy.x < 0) {
                    enemies.splice(eIdx, 1);
                    game.health--;
                    if (game.health <= 0) endGame();
                    return;
                }

                trees.forEach((tree, tIdx) => {
                    if (enemy.isCollidingWith(tree)) {
                        if (tree.takeDamage()) {
                            trees.splice(tIdx, 1);
                            game.health--;
                            if (game.health <= 0) endGame();
                        }
                        enemies.splice(eIdx, 1);
                    }
                });

                projectiles.forEach((proj, pIdx) => {
                    const dx = proj.x - enemy.x;
                    const dy = proj.y - enemy.y;
                    if (Math.sqrt(dx * dx + dy * dy) < proj.size + enemy.size) {
                        enemies.splice(eIdx, 1);
                        projectiles.splice(pIdx, 1);
                        game.score += 10;
                    }
                });
            });

            projectiles = projectiles.filter(p => p.isActive());
            projectiles.forEach(p => p.update());

            if (enemies.length === 0 && game.wave < 10) {
                game.wave++;
                game.treesSaved += trees.length;
                spawnWave();
            }

            updateUI();
        }

        function draw() {
            ctx.fillStyle = 'rgba(135, 206, 235, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            trees.forEach(tree => tree.draw());
            enemies.forEach(enemy => enemy.draw());
            projectiles.forEach(proj => proj.draw());

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Pause: SPACE`, 10, 30);
        }

        function updateUI() {
            document.getElementById('health').textContent = Math.max(0, game.health);
            document.getElementById('score').textContent = game.score;
            document.getElementById('wave').textContent = game.wave;
            document.getElementById('treesaved').textContent = game.treesSaved + trees.length;
        }

        function endGame() {
            game.gameOver = true;
            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('finalTrees').textContent = game.treesSaved + trees.length;
            document.getElementById('finalWave').textContent = game.wave;
            document.getElementById('gameOverScreen').style.display = 'block';
            saveScore();
        }

        function togglePause() {
            game.isPaused = !game.isPaused;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            if (game.isPaused) ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            initGame();
        }

        function goHome() {
            window.location.href = '/90s-games/';
        }

        function saveScore() {
            let scores = JSON.parse(localStorage.getItem('forestGuardianScores') || '[]');
            scores.push({ score: game.score, wave: game.wave, trees: game.treesSaved + trees.length, date: new Date().toISOString() });
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('forestGuardianScores', JSON.stringify(scores.slice(0, 10)));
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            game.mouseX = e.clientX - rect.left;
            game.mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('click', (e) => {
            if (!game.gameOver && !game.isPaused) {
                trees.forEach(tree => {
                    projectiles.push(new Projectile(tree.x, tree.y, game.mouseX, game.mouseY));
                });
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
            }
        });

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
