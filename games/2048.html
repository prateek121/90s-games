<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #faf8ef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        h1 { color: #776e65; font-size: 36px; margin-bottom: 10px; }
        .subtitle { color: #9f8f82; font-size: 12px; margin-bottom: 20px; }
        .info-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .info-box {
            background: #eee4da;
            border-radius: 3px;
            padding: 10px;
            min-width: 100px;
        }
        .info-label { color: #9f8f82; font-size: 12px; margin-bottom: 5px; }
        .info-value { color: #776e65; font-size: 24px; font-weight: bold; }
        .game-board {
            background: #bbada0;
            border-radius: 6px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 340px;
            margin: 0 auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        .cell {
            width: 70px;
            height: 70px;
            background: #cdc1b4;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 28px;
        }
        .cell.empty { background: #cdc1b4; }
        .cell.n2 { background: #eee4da; color: #776e65; }
        .cell.n4 { background: #ede0c8; color: #776e65; }
        .cell.n8 { background: #f2b179; color: #f9f6f2; }
        .cell.n16 { background: #f59563; color: #f9f6f2; }
        .cell.n32 { background: #f67c5f; color: #f9f6f2; }
        .cell.n64 { background: #f65e3b; color: #f9f6f2; }
        .cell.n128 { background: #edcf72; color: #f9f6f2; font-size: 24px; }
        .cell.n256 { background: #edcc61; color: #f9f6f2; font-size: 24px; }
        .cell.n512 { background: #edc850; color: #f9f6f2; font-size: 24px; }
        .cell.n1024 { background: #edc53f; color: #f9f6f2; font-size: 18px; }
        .cell.n2048 { background: #edc22e; color: #f9f6f2; font-size: 18px; }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #9f8a76; }
        .message {
            margin-top: 20px;
            font-size: 16px;
            color: #776e65;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <p class="subtitle">Join the numbers and get to the 2048 tile!</p>

        <div class="info-row">
            <div class="info-box">
                <div class="info-label">SCORE</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">BEST</div>
                <div class="info-value" id="best">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button onclick="game.reset()">NEW GAME</button>
            <button onclick="location.href='../'">BACK</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const game = {
            grid: [],
            score: 0,
            best: localStorage.getItem('best2048') || 0,
            gameOver: false,
            won: false,

            init() {
                this.reset();
            },

            reset() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.addNewTile();
                this.addNewTile();
                this.render();
                document.getElementById('message').textContent = '';
                document.getElementById('best').textContent = this.best;
            },

            addNewTile() {
                const empty = [];
                for (let y = 0; y < 4; y++) {
                    for (let x = 0; x < 4; x++) {
                        if (this.grid[y][x] === 0) empty.push({x, y});
                    }
                }
                if (empty.length > 0) {
                    const pos = empty[Math.floor(Math.random() * empty.length)];
                    this.grid[pos.y][pos.x] = Math.random() < 0.9 ? 2 : 4;
                }
            },

            move(direction) {
                if (this.gameOver || this.won) return;

                let moved = false;
                const oldGrid = JSON.parse(JSON.stringify(this.grid));

                if (direction === 'left' || direction === 'right') {
                    for (let y = 0; y < 4; y++) {
                        if (direction === 'right') this.grid[y].reverse();
                        const row = this.compressRow(this.grid[y]);
                        this.grid[y] = row;
                        if (direction === 'right') this.grid[y].reverse();
                    }
                } else {
                    for (let x = 0; x < 4; x++) {
                        let col = [];
                        for (let y = 0; y < 4; y++) col.push(this.grid[y][x]);
                        if (direction === 'down') col.reverse();
                        col = this.compressRow(col);
                        if (direction === 'down') col.reverse();
                        for (let y = 0; y < 4; y++) this.grid[y][x] = col[y];
                    }
                }

                moved = JSON.stringify(oldGrid) !== JSON.stringify(this.grid);
                if (moved) {
                    this.addNewTile();
                    this.checkGameState();
                    this.render();
                }
            },

            compressRow(row) {
                row = row.filter(x => x !== 0);
                for (let i = 0; i < row.length - 1; i++) {
                    if (row[i] === row[i + 1]) {
                        row[i] *= 2;
                        this.score += row[i];
                        row.splice(i + 1, 1);
                    }
                }
                while (row.length < 4) row.push(0);
                return row;
            },

            checkGameState() {
                let won = false;
                let canMove = false;

                for (let y = 0; y < 4; y++) {
                    for (let x = 0; x < 4; x++) {
                        if (this.grid[y][x] === 2048) won = true;
                        if (this.grid[y][x] === 0) canMove = true;
                        if (x < 3 && this.grid[y][x] === this.grid[y][x + 1]) canMove = true;
                        if (y < 3 && this.grid[y][x] === this.grid[y + 1][x]) canMove = true;
                    }
                }

                if (won && !this.won) {
                    this.won = true;
                    document.getElementById('message').textContent = '🎉 You reached 2048!';
                }

                if (!canMove) {
                    this.gameOver = true;
                    document.getElementById('message').textContent = 'Game Over!';
                }
            },

            render() {
                const board = document.getElementById('gameBoard');
                board.innerHTML = '';
                for (let y = 0; y < 4; y++) {
                    for (let x = 0; x < 4; x++) {
                        const cell = document.createElement('div');
                        const value = this.grid[y][x];
                        cell.className = `cell ${value > 0 ? 'n' + value : 'empty'}`;
                        cell.textContent = value > 0 ? value : '';
                        board.appendChild(cell);
                    }
                }
                document.getElementById('score').textContent = this.score;

                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('best2048', this.best);
                    document.getElementById('best').textContent = this.best;
                }
            }
        };

        game.init();

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft': game.move('left'); e.preventDefault(); break;
                case 'ArrowRight': game.move('right'); e.preventDefault(); break;
                case 'ArrowUp': game.move('up'); e.preventDefault(); break;
                case 'ArrowDown': game.move('down'); e.preventDefault(); break;
            }
        });
    </script>
</body>
</html>
