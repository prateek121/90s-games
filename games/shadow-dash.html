<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW DASH - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #1a1a1a, #2d2d2d);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #ff0080;
            text-shadow: 0 0 15px #ff0080;
            margin-bottom: 15px;
            font-family: monospace;
        }
        canvas#gameCanvas {
            border: 4px solid #ff0080;
            background: linear-gradient(to bottom, #1a1a1a, #2d2d2d);
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.4);
        }
        .info {
            color: #ff0080;
            margin-top: 20px;
            font-size: 14px;
            font-family: monospace;
        }
        .score-display {
            font-size: 28px;
            font-weight: bold;
            color: #ff0080;
            text-shadow: 0 0 15px #ff0080;
            margin: 10px 0;
        }
        .controls {
            font-size: 12px;
            margin: 15px 0;
            color: #cc0066;
        }
        button {
            padding: 8px 16px;
            background: #ff0080;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
            font-family: monospace;
        }
        button:hover { background: #ff3399; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚫ SHADOW DASH ⚫</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-display" id="score">0</div>
            <div class="controls">
                <p>CLICK or ARROW KEYS to move left/right</p>
                <p>Dodge the shadows! Collect power-ups!</p>
            </div>
            <button onclick="game.togglePause()">PAUSE</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 400,
            height: 600,

            player: { x: 175, y: 550, width: 30, height: 30, speed: 6 },
            obstacles: [],
            powerups: [],
            score: 0,
            lives: 3,
            gameRunning: false,
            gamePaused: false,
            gameOver: false,
            frameCount: 0,
            level: 1,
            spawnRate: 80,
            keys: {},

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.startGame();
                this.gameLoop();
            },

            startGame() {
                this.player = { x: 175, y: 550, width: 30, height: 30, speed: 6 };
                this.obstacles = [];
                this.powerups = [];
                this.score = 0;
                this.lives = 3;
                this.gameRunning = true;
                this.gamePaused = false;
                this.gameOver = false;
                this.frameCount = 0;
                this.level = 1;
                this.spawnRate = 80;
            },

            spawnObstacle() {
                this.obstacles.push({
                    x: Math.random() * (this.width - 40),
                    y: -40,
                    width: 40,
                    height: 40,
                    vy: 4 + this.level * 0.5,
                    type: Math.random() > 0.5 ? 'dark' : 'shadow'
                });
            },

            spawnPowerup() {
                this.powerups.push({
                    x: Math.random() * (this.width - 20),
                    y: -20,
                    width: 20,
                    height: 20,
                    vy: 2,
                    type: Math.random() > 0.5 ? 'shield' : 'slow'
                });
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                // Player movement
                if (this.keys['ArrowLeft'] && this.player.x > 0) {
                    this.player.x -= this.player.speed;
                }
                if (this.keys['ArrowRight'] && this.player.x < this.width - this.player.width) {
                    this.player.x += this.player.speed;
                }

                // Spawn obstacles
                this.frameCount++;
                if (this.frameCount % this.spawnRate === 0) {
                    this.spawnObstacle();
                }

                // Spawn powerups occasionally
                if (this.frameCount % 300 === 0) {
                    this.spawnPowerup();
                }

                // Update obstacles
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obstacle = this.obstacles[i];
                    obstacle.y += obstacle.vy;

                    if (obstacle.y > this.height) {
                        this.obstacles.splice(i, 1);
                        this.score += 10;
                        continue;
                    }

                    // Check collision
                    if (this.checkCollision(this.player, obstacle)) {
                        this.obstacles.splice(i, 1);
                        this.lives--;
                        if (this.lives <= 0) {
                            this.endGame();
                        }
                    }
                }

                // Update powerups
                for (let i = this.powerups.length - 1; i >= 0; i--) {
                    const powerup = this.powerups[i];
                    powerup.y += powerup.vy;

                    if (powerup.y > this.height) {
                        this.powerups.splice(i, 1);
                        continue;
                    }

                    // Check collision
                    if (this.checkCollision(this.player, powerup)) {
                        this.powerups.splice(i, 1);
                        if (powerup.type === 'shield') {
                            this.lives++;
                        } else {
                            this.spawnRate += 10;
                        }
                        this.score += 50;
                    }
                }

                // Difficulty
                if (this.score % 200 === 0 && this.score > 0) {
                    this.level = Math.floor(this.score / 200);
                    this.spawnRate = Math.max(40, 80 - this.level * 5);
                }
            },

            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            },

            endGame() {
                this.gameRunning = false;
                this.gameOver = true;
            },

            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                } else {
                    this.startGame();
                }
            },

            draw() {
                // Background gradient
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.height);
                gradient.addColorStop(0, '#1a1a1a');
                gradient.addColorStop(1, '#2d2d2d');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Animated background
                for (let i = 0; i < 20; i++) {
                    this.ctx.fillStyle = `rgba(255, 0, 128, ${0.1 * (1 - i / 20)})`;
                    const x = (i * 50 + this.frameCount / 5) % this.width;
                    const y = (i * 30 + this.frameCount / 8) % this.height;
                    this.ctx.fillRect(x, y, 2, 2);
                }

                // Player
                this.ctx.fillStyle = '#00ff00';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                this.ctx.fillStyle = '#00aa00';
                this.ctx.fillRect(this.player.x + 5, this.player.y + 5, 8, 8);
                this.ctx.fillRect(this.player.x + 17, this.player.y + 5, 8, 8);
                this.ctx.fillStyle = '#ffff00';
                this.ctx.fillRect(this.player.x + 10, this.player.y + 15, 10, 10);

                // Obstacles
                for (let obstacle of this.obstacles) {
                    this.ctx.fillStyle = obstacle.type === 'dark' ? '#1a1a1a' : '#333333';
                    this.ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                    this.ctx.strokeStyle = '#ff0080';
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                }

                // Powerups
                for (let powerup of this.powerups) {
                    this.ctx.fillStyle = powerup.type === 'shield' ? '#ffff00' : '#00ffff';
                    this.ctx.beginPath();
                    this.ctx.arc(powerup.x + powerup.width / 2, powerup.y + powerup.height / 2, powerup.width / 2, 0, Math.PI * 2);
                    this.ctx.fill();

                    this.ctx.strokeStyle = '#ffffff';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                }

                // HUD
                this.ctx.fillStyle = '#ff0080';
                this.ctx.font = 'bold 18px monospace';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`Score: ${this.score}`, 10, 30);
                this.ctx.fillText(`Lives: ${this.lives}`, 10, 60);
                this.ctx.fillText(`Level: ${this.level}`, 10, 90);

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#ff0080';
                    this.ctx.font = 'bold 24px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }

                if (this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#ff0080';
                    this.ctx.font = 'bold 24px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('GAME OVER', this.width / 2, this.height / 2 - 30);
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.font = '18px monospace';
                    this.ctx.fillText(`Final Score: ${this.score}`, this.width / 2, this.height / 2 + 30);
                }

                document.getElementById('score').textContent = this.score;
            },

            setupInput() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                });
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
                this.canvas.addEventListener('click', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    if (x < this.width / 2) {
                        this.player.x = Math.max(0, this.player.x - 40);
                    } else {
                        this.player.x = Math.min(this.width - this.player.width, this.player.x + 40);
                    }
                });
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
