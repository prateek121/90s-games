<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASER GRID - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, monospace;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        canvas#gameCanvas {
            border: 3px solid #00ff00;
            background: #000;
            display: block;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
        }
        .info {
            color: #00ff00;
            min-width: 250px;
        }
        .stat-box {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0;
            font-family: monospace;
        }
        .stat-label { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; letter-spacing: 2px; }
        .stat-value { font-size: 28px; font-family: monospace; font-weight: bold; }
        button {
            width: 100%;
            padding: 10px;
            background: #00ff00;
            color: #000;
            border: 2px solid #00ff00;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            font-family: monospace;
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 0, 0.8); }
        .controls {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            padding: 12px;
            font-size: 10px;
            font-family: monospace;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        .wave {
            color: #00ff00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="480" height="480"></canvas>
        <div class="info">
            <div class="stat-box">
                <div class="stat-label">Wave</div>
                <div class="stat-value" id="wave">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Health</div>
                <div class="stat-value" id="health">100</div>
            </div>
            <div class="controls">
                <strong>CONTROLS:</strong><br/>
                ARROW KEYS Move<br/>
                SPACE Shoot<br/>
                Survive waves!
            </div>
            <button onclick="game.start()">START</button>
            <button onclick="game.restart()">RESET</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 480,
            height: 480,

            player: { x: 240, y: 420, w: 30, h: 30, vx: 0, speed: 5 },
            projectiles: [],
            enemies: [],
            explosions: [],
            score: 0,
            health: 100,
            wave: 1,
            waveEnemies: 0,
            gameRunning: false,
            gameOver: false,
            best: localStorage.getItem('laserGridBest') || 0,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.gameLoop();
            },

            setupInput() {
                const keys = {};
                document.addEventListener('keydown', (e) => {
                    keys[e.key] = true;
                    if (e.key === ' ' && this.gameRunning) {
                        this.shoot();
                        e.preventDefault();
                    }
                    if (e.key === ' ' && !this.gameRunning && !this.gameOver) {
                        this.start();
                    }
                });
                document.addEventListener('keyup', (e) => {
                    keys[e.key] = false;
                });
                this.keys = keys;
            },

            start() {
                if (!this.gameRunning && !this.gameOver) {
                    this.gameRunning = true;
                    if (this.enemies.length === 0) this.spawnWave();
                }
            },

            spawnWave() {
                this.waveEnemies = 5 + this.wave * 2;
                for (let i = 0; i < this.waveEnemies; i++) {
                    this.enemies.push({
                        x: Math.random() * (this.width - 40),
                        y: Math.random() * 100,
                        w: 30,
                        h: 30,
                        vx: (Math.random() - 0.5) * 3,
                        vy: Math.random() * 2 + 1,
                        hp: 1,
                        color: `hsl(${Math.random() * 60 + 120}, 100%, 50%)`
                    });
                }
            },

            shoot() {
                this.projectiles.push({
                    x: this.player.x + this.player.w / 2,
                    y: this.player.y,
                    w: 5,
                    h: 15,
                    vy: -8,
                    color: '#00ff00'
                });
            },

            update() {
                if (!this.gameRunning) return;

                // Player movement
                if (this.keys['ArrowLeft']) this.player.x = Math.max(0, this.player.x - this.player.speed);
                if (this.keys['ArrowRight']) this.player.x = Math.min(this.width - this.player.w, this.player.x + this.player.speed);

                // Update projectiles
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const p = this.projectiles[i];
                    p.y += p.vy;
                    if (p.y < 0) this.projectiles.splice(i, 1);
                }

                // Update enemies
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const e = this.enemies[i];
                    e.x += e.vx;
                    e.y += e.vy;

                    if (e.y > this.height) {
                        this.health -= 10;
                        this.enemies.splice(i, 1);
                        if (this.health <= 0) this.gameOver = true;
                    }

                    // Wall bounce
                    if (e.x < 0 || e.x + e.w > this.width) e.vx *= -1;
                }

                // Collision detection
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const p = this.projectiles[i];
                    for (let j = this.enemies.length - 1; j >= 0; j--) {
                        const e = this.enemies[j];
                        if (p.x < e.x + e.w && p.x + p.w > e.x && p.y < e.y + e.h && p.y + p.h > e.y) {
                            this.explosions.push({ x: e.x + e.w/2, y: e.y + e.h/2, life: 10, size: 20 });
                            this.projectiles.splice(i, 1);
                            this.enemies.splice(j, 1);
                            this.score += 10 * this.wave;
                            break;
                        }
                    }
                }

                // Enemy collision with player
                for (let e of this.enemies) {
                    if (this.player.x < e.x + e.w && this.player.x + this.player.w > e.x &&
                        this.player.y < e.y + e.h && this.player.y + this.player.h > e.y) {
                        this.health -= 5;
                        if (this.health <= 0) this.gameOver = true;
                    }
                }

                // Update explosions
                this.explosions = this.explosions.filter(e => {
                    e.life--;
                    return e.life > 0;
                });

                // Wave progression
                if (this.enemies.length === 0 && this.projectiles.length === 0) {
                    this.wave++;
                    this.spawnWave();
                }

                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('laserGridBest', this.best);
                }
            },

            draw() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Grid background
                this.ctx.strokeStyle = 'rgba(0, 255, 0, 0.1)';
                this.ctx.lineWidth = 1;
                for (let i = 0; i < this.width; i += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i, 0);
                    this.ctx.lineTo(i, this.height);
                    this.ctx.stroke();
                }
                for (let i = 0; i < this.height; i += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i);
                    this.ctx.lineTo(this.width, i);
                    this.ctx.stroke();
                }

                // Draw player
                this.ctx.fillStyle = '#00ff00';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.w, this.player.h);
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(this.player.x, this.player.y, this.player.w, this.player.h);

                // Draw projectiles
                for (let p of this.projectiles) {
                    this.ctx.fillStyle = p.color;
                    this.ctx.fillRect(p.x, p.y, p.w, p.h);
                    this.ctx.strokeStyle = '#fff';
                    this.ctx.lineWidth = 1;
                    this.ctx.strokeRect(p.x, p.y, p.w, p.h);
                }

                // Draw enemies
                for (let e of this.enemies) {
                    this.ctx.fillStyle = e.color;
                    this.ctx.fillRect(e.x, e.y, e.w, e.h);
                    this.ctx.strokeStyle = '#fff';
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(e.x, e.y, e.w, e.h);
                }

                // Draw explosions
                for (let exp of this.explosions) {
                    this.ctx.fillStyle = `rgba(255, 200, 0, ${exp.life / 10})`;
                    this.ctx.beginPath();
                    this.ctx.arc(exp.x, exp.y, exp.size * (1 - exp.life / 10), 0, Math.PI * 2);
                    this.ctx.fill();
                }

                // HUD
                this.ctx.fillStyle = '#00ff00';
                this.ctx.font = 'bold 14px monospace';
                this.ctx.fillText(`WAVE: ${this.wave}`, 10, 20);
                this.ctx.fillText(`SCORE: ${this.score}`, 10, 40);
                this.ctx.fillText(`HEALTH: ${this.health}`, 10, 60);

                if (this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.font = 'bold 20px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('GAME OVER', this.width / 2, this.height / 2);
                }

                document.getElementById('wave').textContent = this.wave;
                document.getElementById('score').textContent = this.score;
                document.getElementById('health').textContent = this.health;
            },

            restart() {
                this.player = { x: 240, y: 420, w: 30, h: 30, vx: 0, speed: 5 };
                this.projectiles = [];
                this.enemies = [];
                this.explosions = [];
                this.score = 0;
                this.health = 100;
                this.wave = 1;
                this.gameRunning = false;
                this.gameOver = false;
                this.draw();
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
