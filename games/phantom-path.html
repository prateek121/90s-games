<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM PATH - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #2a1a4a, #1a0a3a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        canvas#gameCanvas {
            border: 3px solid #ff00ff;
            background: #0a0a1a;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        .info {
            color: #ff00ff;
            margin-top: 20px;
            font-size: 14px;
        }
        .score-display {
            font-size: 28px;
            font-weight: bold;
            color: #ff00ff;
            margin: 10px 0;
        }
        button {
            padding: 8px 16px;
            background: #ff00ff;
            color: #0a0a1a;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 10px rgba(255, 0, 255, 0.8); }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #ff00ff;">👻 PHANTOM PATH 👻</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-display" id="score">0</div>
            <div style="margin: 10px 0;">Level: <span id="level">1</span> | High: <span id="highScore">0</span></div>
            <p style="margin: 10px 0;">Arrow Keys to navigate • Reach the exit</p>
            <button onclick="game.togglePause()">PAUSE</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 400,
            height: 600,

            player: { x: 20, y: 20, width: 15, height: 15, speed: 3, invulnerable: 0 },
            exit: { x: 360, y: 550, width: 30, height: 30 },
            walls: [],
            ghosts: [],
            particles: [],
            powerups: [],
            score: 0,
            level: 1,
            highScore: localStorage.getItem('phantomPathHigh') || 0,
            gameRunning: false,
            gamePaused: false,
            gameOver: false,
            levelComplete: false,
            levelCompleteTimer: 0,
            frameCount: 0,
            keys: {},
            timeLimit: 0,
            timeLeft: 0,
            lives: 3,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.startGame();
                this.gameLoop();
                document.getElementById('highScore').textContent = this.highScore;
            },

            startGame() {
                this.player = { x: 20, y: 20, width: 15, height: 15, speed: 3, invulnerable: 0 };
                this.exit = { x: 360, y: 550, width: 30, height: 30 };
                this.walls = this.generateMaze();
                this.ghosts = this.spawnGhosts();
                this.particles = [];
                this.powerups = [];
                this.score = 0;
                this.level = 1;
                this.lives = 3;
                this.timeLimit = 300 + this.level * 50;
                this.timeLeft = this.timeLimit;
                this.gameRunning = true;
                this.gamePaused = false;
                this.gameOver = false;
                this.levelComplete = false;
                this.levelCompleteTimer = 0;
                this.frameCount = 0;
            },

            generateMaze() {
                const walls = [];
                const divisions = 3 + this.level;
                const spacing = Math.floor(this.width / divisions);

                for (let i = 1; i < divisions; i++) {
                    const x = i * spacing;
                    const gap = Math.random() * 200 + 50;
                    const gapStart = Math.random() * (this.height - gap);

                    // Top section
                    if (gapStart > 50) {
                        walls.push({ x, y: 0, width: 20, height: gapStart });
                    }
                    // Bottom section
                    if (gapStart + gap < this.height) {
                        walls.push({ x, y: gapStart + gap, width: 20, height: this.height - (gapStart + gap) });
                    }
                }

                // Side walls
                walls.push({ x: 0, y: 0, width: 20, height: this.height });
                walls.push({ x: this.width - 20, y: 0, width: 20, height: this.height });

                return walls;
            },

            spawnGhosts() {
                const ghosts = [];
                const count = 1 + this.level;
                for (let i = 0; i < count; i++) {
                    ghosts.push({
                        x: 100 + i * 80,
                        y: 300,
                        width: 12,
                        height: 12,
                        vx: Math.random() * 2 - 1,
                        vy: Math.random() * 2 - 1,
                        speed: 1 + this.level * 0.3
                    });
                }
                return ghosts;
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                // Player movement
                let newX = this.player.x;
                let newY = this.player.y;

                if (this.keys['ArrowLeft']) newX -= this.player.speed;
                if (this.keys['ArrowRight']) newX += this.player.speed;
                if (this.keys['ArrowUp']) newY -= this.player.speed;
                if (this.keys['ArrowDown']) newY += this.player.speed;

                // Collision check
                const testRect = { x: newX, y: newY, width: this.player.width, height: this.player.height };
                if (!this.collidesWithWalls(testRect)) {
                    this.player.x = newX;
                    this.player.y = newY;
                }

                // Ghost AI
                for (let ghost of this.ghosts) {
                    ghost.x += ghost.vx * ghost.speed;
                    ghost.y += ghost.vy * ghost.speed;

                    // Wall collision for ghosts
                    if (ghost.x < 0 || ghost.x + ghost.width > this.width) ghost.vx *= -1;
                    if (ghost.y < 0 || ghost.y + ghost.height > this.height) ghost.vy *= -1;

                    // Random direction changes
                    if (Math.random() < 0.02) {
                        ghost.vx = Math.random() * 2 - 1;
                        ghost.vy = Math.random() * 2 - 1;
                    }

                    // Ghost collision with player
                    if (this.checkCollision(this.player, ghost)) {
                        if (this.player.invulnerable <= 0) {
                            this.lives--;
                            this.player.invulnerable = 60;
                            if (this.lives <= 0) {
                                this.endGame();
                                return;
                            }
                        }
                    }
                }

                // Powerup updates
                for (let i = this.powerups.length - 1; i >= 0; i--) {
                    const pu = this.powerups[i];
                    if (this.checkCollision(this.player, pu)) {
                        if (pu.type === 'shield') {
                            this.player.invulnerable = 120;
                        } else if (pu.type === 'speed') {
                            this.player.speed = 5;
                            setTimeout(() => { this.player.speed = 3; }, 5000);
                        }
                        this.powerups.splice(i, 1);
                    }
                }

                // Time management
                this.timeLeft--;
                if (this.timeLeft <= 0) {
                    this.endGame();
                    return;
                }

                // Spawn powerups occasionally
                if (this.frameCount % 200 === 0 && this.powerups.length < 1) {
                    this.powerups.push({
                        x: 50 + Math.random() * 300,
                        y: 100 + Math.random() * 300,
                        width: 15,
                        height: 15,
                        type: Math.random() > 0.5 ? 'shield' : 'speed'
                    });
                }

                // Exit collision
                if (this.checkCollision(this.player, this.exit)) {
                    const timeBonus = Math.max(0, this.timeLeft * 2);
                    this.levelComplete = true;
                    this.levelCompleteTimer = 30;
                    this.score += (500 * this.level) + timeBonus;
                    this.level++;
                }

                if (this.levelComplete) {
                    this.levelCompleteTimer--;
                    if (this.levelCompleteTimer === 0) {
                        this.player = { x: 20, y: 20, width: 15, height: 15, speed: 3, invulnerable: 0 };
                        this.exit = { x: 360, y: 550, width: 30, height: 30 };
                        this.walls = this.generateMaze();
                        this.ghosts = this.spawnGhosts();
                        this.powerups = [];
                        this.timeLimit = 300 + this.level * 50;
                        this.timeLeft = this.timeLimit;
                        this.levelComplete = false;
                    }
                }

                if (this.player.invulnerable > 0) {
                    this.player.invulnerable--;
                }

                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
            },

            collidesWithWalls(rect) {
                for (let wall of this.walls) {
                    if (rect.x < wall.x + wall.width &&
                        rect.x + rect.width > wall.x &&
                        rect.y < wall.y + wall.height &&
                        rect.y + rect.height > wall.y) {
                        return true;
                    }
                }
                return false;
            },

            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            },

            endGame() {
                this.gameRunning = false;
                this.gameOver = true;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('phantomPathHigh', this.highScore);
                    document.getElementById('highScore').textContent = this.highScore;
                }
            },

            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                } else {
                    this.startGame();
                }
            },

            draw() {
                // Background with gradient
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.height);
                gradient.addColorStop(0, '#2a1a4a');
                gradient.addColorStop(1, '#1a0a3a');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Walls
                this.ctx.fillStyle = '#00ffff';
                for (let wall of this.walls) {
                    this.ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
                    this.ctx.strokeStyle = '#0099ff';
                    this.ctx.lineWidth = 1;
                    this.ctx.strokeRect(wall.x, wall.y, wall.width, wall.height);
                }

                // Exit
                this.ctx.fillStyle = '#00ff00';
                this.ctx.fillRect(this.exit.x, this.exit.y, this.exit.width, this.exit.height);
                this.ctx.strokeStyle = '#00aa00';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(this.exit.x, this.exit.y, this.exit.width, this.exit.height);

                // Ghosts
                this.ctx.fillStyle = '#ff00ff';
                for (let ghost of this.ghosts) {
                    this.ctx.beginPath();
                    this.ctx.arc(ghost.x + ghost.width / 2, ghost.y + ghost.height / 2, 8, 0, Math.PI * 2);
                    this.ctx.fill();
                    // Eyes
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.fillRect(ghost.x + 2, ghost.y + 2, 3, 3);
                    this.ctx.fillRect(ghost.x + 7, ghost.y + 2, 3, 3);
                    this.ctx.fillStyle = '#ff00ff';
                }

                // Powerups
                for (let pu of this.powerups) {
                    this.ctx.fillStyle = pu.type === 'shield' ? '#00ff00' : '#ffff00';
                    this.ctx.fillRect(pu.x, pu.y, pu.width, pu.height);
                    this.ctx.strokeStyle = '#ffffff';
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(pu.x, pu.y, pu.width, pu.height);
                }

                // Player
                if (this.player.invulnerable > 0 && Math.floor(this.player.invulnerable / 10) % 2 === 0) {
                    this.ctx.globalAlpha = 0.5;
                }
                this.ctx.fillStyle = '#ffff00';
                this.ctx.beginPath();
                this.ctx.arc(this.player.x + this.player.width / 2, this.player.y + this.player.height / 2, 8, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.strokeStyle = '#ffaa00';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                this.ctx.globalAlpha = 1;

                // HUD
                this.ctx.fillStyle = '#00ffff';
                this.ctx.font = 'bold 12px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`Lives: ${this.lives}`, 10, 30);
                this.ctx.fillText(`Level: ${this.level}`, 10, 50);
                this.ctx.textAlign = 'right';
                this.ctx.fillText(`Time: ${Math.ceil(this.timeLeft / 60)}s`, this.width - 10, 30);

                if (this.levelComplete) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('ESCAPED!', this.width / 2, this.height / 2);
                }

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#ff00ff';
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }

                if (this.gameOver && !this.levelComplete) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#ff0000';
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('CAUGHT!', this.width / 2, this.height / 2 - 30);
                    this.ctx.font = '16px Arial';
                    this.ctx.fillText(`Final Score: ${this.score}`, this.width / 2, this.height / 2 + 20);
                }
            },

            setupInput() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (e.key === ' ') {
                        e.preventDefault();
                        this.togglePause();
                    }
                });
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
