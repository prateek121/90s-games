<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROST MAZE - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { text-align: center; }
        canvas#gameCanvas {
            border: 3px solid #fff;
            background: #e0f7ff;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 150, 200, 0.8);
        }
        h1 { color: #fff; text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); margin-bottom: 10px; }
        .info { color: #fff; margin-top: 20px; font-size: 14px; }
        .score-display {
            font-size: 32px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 10px 0;
        }
        .controls { font-size: 12px; margin: 15px 0; color: #eee; }
        button {
            padding: 8px 16px;
            background: #00a8d8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover { background: #00c8ff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>❄️ FROST MAZE ❄️</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-display" id="score">Level 1</div>
            <div class="controls">
                <p>LEFT/RIGHT ARROW or A/D to move</p>
                <p>Find the exit through the frozen maze!</p>
            </div>
            <button onclick="game.togglePause()">PAUSE</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 400,
            height: 600,
            player: { x: 175, y: 550, width: 20, height: 20, speed: 3 },
            maze: [],
            level: 1,
            gameRunning: false,
            gamePaused: false,
            gameOver: false,
            highScore: localStorage.getItem('frost-maze-high') || 0,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.generateMaze();
                this.startGame();
                this.gameLoop();
            },

            generateMaze() {
                this.maze = [];
                const cols = 8;
                const rows = 10;
                const cellW = this.width / cols;
                const cellH = this.height / rows;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (Math.random() > 0.3 || (r === 0 && c === 3)) {
                            this.maze.push({
                                x: c * cellW,
                                y: r * cellH,
                                width: cellW,
                                height: cellH,
                                wall: Math.random() > 0.5
                            });
                        }
                    }
                }

                this.exit = {
                    x: 175,
                    y: 20,
                    width: 50,
                    height: 30
                };
            },

            startGame() {
                this.player = { x: 175, y: 550, width: 20, height: 20, speed: 3 };
                this.gameRunning = true;
                this.gamePaused = false;
                this.gameOver = false;
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                let newX = this.player.x;
                let newY = this.player.y;

                if (this.keys['ArrowLeft'] || this.keys['a']) {
                    newX -= this.player.speed;
                }
                if (this.keys['ArrowRight'] || this.keys['d']) {
                    newX += this.player.speed;
                }
                if (this.keys['ArrowUp'] || this.keys['w']) {
                    newY -= this.player.speed;
                }
                if (this.keys['ArrowDown'] || this.keys['s']) {
                    newY += this.player.speed;
                }

                // Boundary check
                if (newX >= 0 && newX + this.player.width <= this.width &&
                    newY >= 0 && newY + this.player.height <= this.height) {
                    this.player.x = newX;
                    this.player.y = newY;
                }

                // Check exit collision
                if (this.checkCollision(this.player, this.exit)) {
                    this.level++;
                    this.generateMaze();
                }
            },

            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            },

            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                }
            },

            draw() {
                this.ctx.fillStyle = '#e0f7ff';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Draw maze cells
                for (let cell of this.maze) {
                    if (cell.wall) {
                        this.ctx.fillStyle = '#0099cc';
                        this.ctx.fillRect(cell.x, cell.y, cell.width, cell.height);
                        this.ctx.strokeStyle = '#005588';
                        this.ctx.lineWidth = 2;
                        this.ctx.strokeRect(cell.x, cell.y, cell.width, cell.height);
                    }
                }

                // Draw exit
                this.ctx.fillStyle = '#00ff88';
                this.ctx.fillRect(this.exit.x, this.exit.y, this.exit.width, this.exit.height);
                this.ctx.fillStyle = '#00dd66';
                this.ctx.font = 'bold 14px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('EXIT', this.exit.x + this.exit.width / 2, this.exit.y + 20);

                // Draw player
                this.ctx.fillStyle = '#00ffff';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                this.ctx.fillStyle = '#fff';
                this.ctx.fillRect(this.player.x + 4, this.player.y + 4, 4, 4);
                this.ctx.fillRect(this.player.x + 12, this.player.y + 4, 4, 4);

                // Info
                this.ctx.fillStyle = '#005588';
                this.ctx.font = 'bold 20px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText('Level: ' + this.level, 10, 30);

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }

                document.getElementById('score').textContent = 'Level ' + this.level;
            },

            setupInput() {
                this.keys = {};
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
                        e.preventDefault();
                    }
                });
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
