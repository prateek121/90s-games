<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Digger - 90s Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #8B4513, #654321);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            border: 3px solid #FFD700;
            background: linear-gradient(to bottom, #D2B48C 0%, #8B7355 100%);
            display: block;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .stat {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 5px;
            border: 2px solid #FFD700;
        }

        .controls {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            border: 2px solid #FFD700;
        }

        button {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #FFFF00;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            border: 3px solid #FFD700;
        }

        .game-over h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #FFD700;
        }

        .game-over p {
            font-size: 1.3em;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛏️ Earth Digger ⛏️</h1>
        <div class="stats">
            <div class="stat">Gold: <span id="gold">0</span></div>
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Depth: <span id="depth">0</span>m</div>
            <div class="stat">Lives: <span id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="controls">
            <button onclick="togglePause()">Pause</button>
            <button onclick="restartGame()">Restart</button>
            <button onclick="goHome()">Home</button>
        </div>
        <p style="margin-top: 15px; font-size: 0.9em;">Click on gems to collect | Avoid obstacles</p>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Gold Collected: <span id="finalGold">0</span></p>
        <p>Max Depth: <span id="finalDepth">0</span>m</p>
        <button onclick="restartGame()" style="margin-top: 20px;">Play Again</button>
        <button onclick="goHome()" style="margin-top: 20px;">Home</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const game = {
            gold: 0,
            score: 0,
            depth: 0,
            maxDepth: 0,
            lives: 3,
            isPaused: false,
            gameOver: false,
            time: 0
        };

        const player = {
            x: canvas.width / 2,
            y: 50,
            width: 25,
            height: 25
        };

        class Gem {
            constructor() {
                this.x = Math.random() * (canvas.width - 30) + 15;
                this.y = Math.random() * (canvas.height - 100) + 50;
                this.size = 8;
                this.type = Math.floor(Math.random() * 3);
                this.rotation = Math.random() * Math.PI * 2;
                this.bob = Math.random() * Math.PI * 2;
            }

            update() {
                this.bob += 0.05;
                this.rotation += 0.03;
            }

            draw() {
                const colors = ['#FFD700', '#FF1493', '#00FF00'];
                ctx.save();
                ctx.translate(this.x, this.y + Math.sin(this.bob) * 3);
                ctx.rotate(this.rotation);
                ctx.fillStyle = colors[this.type];
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(this.size, 0);
                ctx.lineTo(0, this.size);
                ctx.lineTo(-this.size, 0);
                ctx.fill();
                ctx.restore();
            }

            isCollected(px, py) {
                const dx = this.x - px;
                const dy = this.y - py;
                return Math.sqrt(dx * dx + dy * dy) < this.size + 15;
            }
        }

        class Hazard {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.size = 12;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < this.size || this.x > canvas.width - this.size) this.vx *= -1;
                if (this.y < this.size || this.y > canvas.height - this.size) this.vy *= -1;

                this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
                this.y = Math.max(this.size, Math.min(canvas.height - this.size, this.y));
            }

            draw() {
                ctx.fillStyle = '#8B0000';
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const x = this.x + Math.cos(angle) * this.size;
                    const y = this.y + Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
            }

            collidesWith(px, py, w, h) {
                return Math.abs(this.x - px) < this.size + w / 2 &&
                       Math.abs(this.y - py) < this.size + h / 2;
            }
        }

        let gems = [];
        let hazards = [];

        function initGame() {
            gems = [];
            hazards = [];
            game.gold = 0;
            game.score = 0;
            game.depth = 0;
            game.maxDepth = 0;
            game.lives = 3;
            game.isPaused = false;
            game.gameOver = false;
            game.time = 0;
            player.x = canvas.width / 2;
            player.y = 50;

            for (let i = 0; i < 6; i++) {
                gems.push(new Gem());
            }

            for (let i = 0; i < 2; i++) {
                hazards.push(new Hazard());
            }
        }

        function update() {
            if (game.gameOver || game.isPaused) return;

            game.time++;
            game.depth = Math.floor(game.time / 10);
            game.maxDepth = Math.max(game.maxDepth, game.depth);

            if (game.time % 300 === 0 && hazards.length < 5) {
                hazards.push(new Hazard());
            }

            gems.forEach((gem, idx) => {
                gem.update();
            });

            hazards.forEach((haz, idx) => {
                haz.update();

                if (haz.collidesWith(player.x, player.y, player.width, player.height)) {
                    game.lives--;
                    if (game.lives <= 0) {
                        endGame();
                        return;
                    } else {
                        player.x = canvas.width / 2;
                        player.y = 50;
                    }
                }
            });

            updateUI();
        }

        function draw() {
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const gridSize = 30;
            ctx.strokeStyle = 'rgba(101, 67, 33, 0.5)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= canvas.height; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            gems.forEach(g => g.draw());
            hazards.forEach(h => h.draw());

            ctx.fillStyle = '#FFD700';
            ctx.fillRect(player.x - player.width / 2, player.y - player.height / 2, player.width, player.height);
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x - player.width / 2, player.y - player.height / 2, player.width, player.height);

            ctx.fillStyle = '#000';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('⛏', player.x, player.y + 3);
        }

        function updateUI() {
            document.getElementById('gold').textContent = game.gold;
            document.getElementById('score').textContent = game.score;
            document.getElementById('depth').textContent = game.depth;
            document.getElementById('lives').textContent = game.lives;
        }

        function endGame() {
            game.gameOver = true;
            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('finalGold').textContent = game.gold;
            document.getElementById('finalDepth').textContent = game.maxDepth;
            document.getElementById('gameOverScreen').style.display = 'block';
            saveScore();
        }

        function togglePause() {
            game.isPaused = !game.isPaused;
        }

        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            initGame();
        }

        function goHome() {
            window.location.href = '/90s-games/';
        }

        function saveScore() {
            let scores = JSON.parse(localStorage.getItem('earthDiggerScores') || '[]');
            scores.push({ score: game.score, gold: game.gold, depth: game.maxDepth, date: new Date().toISOString() });
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('earthDiggerScores', JSON.stringify(scores.slice(0, 10)));
        }

        canvas.addEventListener('click', (e) => {
            if (!game.gameOver && !game.isPaused) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                gems.forEach((gem, idx) => {
                    if (gem.isCollected(x, y)) {
                        gems.splice(idx, 1);
                        game.gold++;
                        game.score += 50;

                        if (gems.length < 3) {
                            gems.push(new Gem());
                        }
                    }
                });

                player.x = x;
                player.y = y;
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
            }
        });

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
