<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME RACER - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, monospace;
            background: linear-gradient(135deg, #1a3a52 0%, #0d4f5c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        canvas#gameCanvas {
            border: 3px solid #00ffff;
            background: #000;
            display: block;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }
        .info {
            color: #00ffff;
            min-width: 250px;
        }
        .stat-box {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0;
        }
        .stat-label { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; letter-spacing: 2px; }
        .stat-value { font-size: 28px; font-family: monospace; font-weight: bold; }
        button {
            width: 100%;
            padding: 10px;
            background: #00ffff;
            color: #000;
            border: 2px solid #00ffff;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            font-family: monospace;
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 255, 0.8); }
        .controls {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            padding: 12px;
            font-size: 10px;
            font-family: monospace;
            line-height: 1.8;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="info">
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="time">60</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
            <div class="controls">
                <strong>CONTROLS:</strong><br/>
                MOUSE Move<br/>
                Click circles<br/>
                Beat the clock!
            </div>
            <button onclick="game.start()">START</button>
            <button onclick="game.restart()">RESET</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 500,
            height: 500,

            mouse: { x: 250, y: 250 },
            circles: [],
            score: 0,
            time: 60,
            startTime: 60,
            gameRunning: false,
            gameOver: false,
            best: localStorage.getItem('timeRacerBest') || 0,
            frameCount: 0,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.canvas.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    this.mouse.x = e.clientX - rect.left;
                    this.mouse.y = e.clientY - rect.top;
                });
                this.canvas.addEventListener('click', () => this.checkClicks());
                this.canvas.addEventListener('touchmove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    this.mouse.x = e.touches[0].clientX - rect.left;
                    this.mouse.y = e.touches[0].clientY - rect.top;
                    e.preventDefault();
                });
                this.canvas.addEventListener('touchend', () => this.checkClicks());
                document.addEventListener('keydown', (e) => {
                    if (e.key === ' ' && !this.gameRunning && !this.gameOver) {
                        this.start();
                    }
                });
                this.gameLoop();
            },

            start() {
                if (!this.gameRunning && !this.gameOver) {
                    this.gameRunning = true;
                    this.spawnCircles();
                }
            },

            spawnCircles() {
                this.circles = [];
                const count = 5 + Math.floor(this.score / 100);
                for (let i = 0; i < count; i++) {
                    this.circles.push({
                        x: Math.random() * (this.width - 80) + 40,
                        y: Math.random() * (this.height - 80) + 40,
                        radius: 25 + Math.random() * 15,
                        color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                        active: true
                    });
                }
            },

            checkClicks() {
                if (!this.gameRunning) return;
                for (let circle of this.circles) {
                    if (!circle.active) continue;
                    const dx = this.mouse.x - circle.x;
                    const dy = this.mouse.y - circle.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < circle.radius) {
                        circle.active = false;
                        this.score += 10;
                    }
                }
                if (this.circles.every(c => !c.active)) {
                    this.spawnCircles();
                }
            },

            update() {
                if (!this.gameRunning) return;

                this.frameCount++;
                if (this.frameCount % 60 === 0) {
                    this.time--;
                    if (this.time <= 0) {
                        this.gameOver = true;
                        this.gameRunning = false;
                    }
                }

                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('timeRacerBest', this.best);
                }
            },

            draw() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Draw circles
                for (let circle of this.circles) {
                    if (!circle.active) continue;
                    this.ctx.fillStyle = circle.color;
                    this.ctx.beginPath();
                    this.ctx.arc(circle.x, circle.y, circle.radius, 0, Math.PI * 2);
                    this.ctx.fill();

                    this.ctx.strokeStyle = '#fff';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();

                    // Glow
                    this.ctx.strokeStyle = circle.color;
                    this.ctx.lineWidth = 1;
                    this.ctx.globalAlpha = 0.5;
                    this.ctx.stroke();
                    this.ctx.globalAlpha = 1;
                }

                // Draw cursor
                this.ctx.fillStyle = '#00ffff';
                this.ctx.beginPath();
                this.ctx.arc(this.mouse.x, this.mouse.y, 5, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();

                // HUD
                this.ctx.fillStyle = '#00ffff';
                this.ctx.font = 'bold 16px monospace';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`TIME: ${this.time}s`, 10, 25);
                this.ctx.fillText(`SCORE: ${this.score}`, 10, 50);

                if (this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#00ffff';
                    this.ctx.font = 'bold 24px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('TIME UP!', this.width / 2, this.height / 2);
                }

                document.getElementById('time').textContent = this.time;
                document.getElementById('score').textContent = this.score;
                document.getElementById('best').textContent = this.best;
            },

            restart() {
                this.circles = [];
                this.score = 0;
                this.time = this.startTime;
                this.gameRunning = false;
                this.gameOver = false;
                this.frameCount = 0;
                this.draw();
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
