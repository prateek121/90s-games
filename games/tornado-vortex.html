<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORNADO VORTEX - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2d5016, #1a3009);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { text-align: center; }
        canvas#gameCanvas {
            border: 3px solid #fff;
            background: linear-gradient(135deg, #4a7a2d, #2d5016);
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(100, 200, 50, 0.8);
        }
        h1 { color: #fff; text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); margin-bottom: 10px; }
        .info { color: #fff; margin-top: 20px; font-size: 14px; }
        .score-display {
            font-size: 32px;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 10px 0;
        }
        .controls { font-size: 12px; margin: 15px 0; color: #ccc; }
        button {
            padding: 8px 16px;
            background: #66aa33;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover { background: #88cc55; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌪️ TORNADO VORTEX 🌪️</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-display" id="score">0</div>
            <div class="controls">
                <p>CLICK to create force fields</p>
                <p>Harness the tornado's power!</p>
            </div>
            <button onclick="game.togglePause()">PAUSE</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 400,
            height: 600,
            tornado: { x: 200, y: 300, radius: 50, rotation: 0, speed: 0.05 },
            particles: [],
            forceFields: [],
            score: 0,
            gameRunning: false,
            gamePaused: false,
            frameCount: 0,
            highScore: localStorage.getItem('tornado-vortex-high') || 0,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.startGame();
                this.gameLoop();
            },

            startGame() {
                this.tornado = { x: 200, y: 300, radius: 50, rotation: 0, speed: 0.05 };
                this.particles = [];
                this.forceFields = [];
                this.score = 0;
                this.gameRunning = true;
                this.gamePaused = false;
                this.frameCount = 0;

                // Create initial particles
                for (let i = 0; i < 50; i++) {
                    this.particles.push(this.createParticle());
                }
            },

            createParticle() {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * this.tornado.radius;
                return {
                    x: this.tornado.x + Math.cos(angle) * distance,
                    y: this.tornado.y + Math.sin(angle) * distance,
                    vx: Math.cos(angle) * 2,
                    vy: Math.sin(angle) * 2,
                    life: 100,
                    maxLife: 100
                };
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                // Update tornado rotation
                this.tornado.rotation += this.tornado.speed;

                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    const dx = this.tornado.x - p.x;
                    const dy = this.tornado.y - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    // Attraction to tornado
                    if (dist < 150) {
                        p.vx += (dx / dist) * 0.3;
                        p.vy += (dy / dist) * 0.3;
                    }

                    // Circular motion
                    const angle = Math.atan2(p.y - this.tornado.y, p.x - this.tornado.x);
                    p.vx += Math.cos(angle + Math.PI / 2) * 0.2;
                    p.vy += Math.sin(angle + Math.PI / 2) * 0.2;

                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;

                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                        this.particles.push(this.createParticle());
                        this.score++;
                    }
                }

                // Update force fields
                for (let i = this.forceFields.length - 1; i >= 0; i--) {
                    const ff = this.forceFields[i];
                    ff.life--;
                    if (ff.life <= 0) {
                        this.forceFields.splice(i, 1);
                    }
                }

                // Tornado movement
                this.tornado.x = 200 + Math.sin(this.frameCount * 0.02) * 80;
                this.frameCount++;
            },

            endGame() {
                this.gameRunning = false;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('tornado-vortex-high', this.highScore);
                }
            },

            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                } else {
                    this.startGame();
                }
            },

            draw() {
                this.ctx.fillStyle = '#4a7a2d';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Draw particles
                for (let p of this.particles) {
                    this.ctx.fillStyle = `rgba(100, 200, 50, ${p.life / p.maxLife})`;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    this.ctx.fill();
                }

                // Draw force fields
                for (let ff of this.forceFields) {
                    this.ctx.strokeStyle = `rgba(255, 200, 50, ${ff.life / ff.maxLife * 0.5})`;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(ff.x, ff.y, ff.radius, 0, Math.PI * 2);
                    this.ctx.stroke();
                }

                // Draw tornado
                this.ctx.save();
                this.ctx.translate(this.tornado.x, this.tornado.y);
                this.ctx.rotate(this.tornado.rotation);

                // Tornado spiral
                this.ctx.strokeStyle = 'rgba(150, 255, 150, 0.6)';
                this.ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    this.ctx.beginPath();
                    const startAngle = (i * Math.PI * 2) / 3;
                    for (let angle = startAngle; angle < startAngle + Math.PI * 2; angle += 0.1) {
                        const x = Math.cos(angle) * (20 + angle * 5);
                        const y = Math.sin(angle) * (20 + angle * 5);
                        if (angle === startAngle) {
                            this.ctx.moveTo(x, y);
                        } else {
                            this.ctx.lineTo(x, y);
                        }
                    }
                    this.ctx.stroke();
                }

                // Tornado center
                this.ctx.fillStyle = '#ffff00';
                this.ctx.beginPath();
                this.ctx.arc(0, 0, 8, 0, Math.PI * 2);
                this.ctx.fill();

                this.ctx.restore();

                // Score and info
                this.ctx.fillStyle = '#ffff00';
                this.ctx.font = 'bold 24px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText('Score: ' + this.score, 10, 30);
                this.ctx.fillText('High: ' + this.highScore, 10, 55);

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }

                document.getElementById('score').textContent = this.score;
            },

            setupInput() {
                this.canvas.addEventListener('click', (e) => {
                    if (!this.gamePaused && this.gameRunning) {
                        const rect = this.canvas.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        this.forceFields.push({
                            x: x,
                            y: y,
                            radius: 40,
                            life: 30,
                            maxLife: 30
                        });
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'p' || e.key === 'P') this.togglePause();
                });
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
