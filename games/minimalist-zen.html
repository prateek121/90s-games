<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Zen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .stat {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border-left: 3px solid #666;
        }

        .stat-label {
            font-size: 0.8em;
            color: #999;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            color: #333;
            font-weight: 300;
        }

        canvas {
            background: #fafafa;
            border-radius: 4px;
            display: block;
            margin: 20px auto;
            border: 1px solid #eee;
            cursor: pointer;
        }

        .instructions {
            color: #666;
            margin: 20px 0;
            font-size: 0.95em;
            line-height: 1.6;
        }

        button {
            background: #333;
            color: #fff;
            border: none;
            padding: 12px 40px;
            margin: 10px 5px;
            border-radius: 4px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            background: #555;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            color: #666;
            font-size: 1em;
            margin: 15px 0;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Minimalist Zen</h1>
        <p class="subtitle">A meditative puzzle experience</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">MOVES</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="500" height="400"></canvas>

        <div class="instructions">
            <p>Click tiles to match colors and create harmonious patterns</p>
        </div>

        <div id="message" class="message"></div>

        <button id="startBtn" onclick="game.start()">Begin</button>
        <button onclick="location.reload()">Reset</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const game = {
            running: false,
            moves: 0,
            score: 0,

            gridSize: 5,
            tiles: [],
            selected: null,

            colors: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'],

            init() {
                canvas.addEventListener('click', (e) => this.handleClick(e));
            },

            start() {
                this.running = true;
                this.moves = 0;
                this.score = 0;
                document.getElementById('startBtn').disabled = true;
                this.generateGrid();
                this.update();
            },

            generateGrid() {
                this.tiles = [];
                for (let i = 0; i < this.gridSize; i++) {
                    this.tiles[i] = [];
                    for (let j = 0; j < this.gridSize; j++) {
                        this.tiles[i][j] = {
                            color: this.colors[Math.floor(Math.random() * this.colors.length)],
                            scale: 1,
                            matched: false
                        };
                    }
                }
                this.selected = null;
            },

            handleClick(e) {
                if (!this.running) return;

                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const tileSize = 80;
                const offsetX = 10;
                const offsetY = 10;

                const col = Math.floor((x - offsetX) / tileSize);
                const row = Math.floor((y - offsetY) / tileSize);

                if (col >= 0 && col < this.gridSize && row >= 0 && row < this.gridSize) {
                    if (!this.selected) {
                        this.selected = { row, col };
                    } else {
                        this.tryMatch(row, col);
                    }
                }
            },

            tryMatch(row, col) {
                const selected = this.selected;
                const distance = Math.abs(selected.row - row) + Math.abs(selected.col - col);

                if (distance === 1) {
                    const tile1 = this.tiles[selected.row][selected.col];
                    const tile2 = this.tiles[row][col];

                    if (tile1.color === tile2.color) {
                        this.moves++;
                        this.score += 100;
                        tile1.matched = true;
                        tile2.matched = true;
                        setTimeout(() => this.fillMatched(), 200);
                    }
                }
                this.selected = null;
            },

            fillMatched() {
                for (let i = 0; i < this.gridSize; i++) {
                    for (let j = 0; j < this.gridSize; j++) {
                        if (this.tiles[i][j].matched) {
                            this.tiles[i][j] = {
                                color: this.colors[Math.floor(Math.random() * this.colors.length)],
                                scale: 1,
                                matched: false
                            };
                        }
                    }
                }
            },

            update() {
                if (!this.running) return;

                this.draw();
                this.updateUI();
                requestAnimationFrame(() => this.update());
            },

            draw() {
                ctx.fillStyle = '#fafafa';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const tileSize = 80;
                const offsetX = 10;
                const offsetY = 10;

                for (let i = 0; i < this.gridSize; i++) {
                    for (let j = 0; j < this.gridSize; j++) {
                        const tile = this.tiles[i][j];
                        const x = offsetX + j * tileSize;
                        const y = offsetY + i * tileSize;

                        ctx.fillStyle = tile.color;
                        const scale = tile.scale;
                        const scaledSize = (tileSize - 4) * scale;
                        ctx.fillRect(x + (tileSize - scaledSize) / 2, y + (tileSize - scaledSize) / 2, scaledSize, scaledSize);

                        if (this.selected && this.selected.row === i && this.selected.col === j) {
                            ctx.strokeStyle = '#333';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(x + 2, y + 2, tileSize - 4, tileSize - 4);
                        }
                    }
                }
            },

            updateUI() {
                document.getElementById('moves').textContent = this.moves;
                document.getElementById('score').textContent = this.score;
            }
        };

        game.init();
    </script>
</body>
</html>
