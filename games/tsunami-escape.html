<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSUNAMI ESCAPE - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #006994, #003d5c);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { text-align: center; }
        canvas#gameCanvas {
            border: 3px solid #fff;
            background: linear-gradient(to bottom, #87ceeb, #0099cc);
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 150, 200, 0.8);
        }
        h1 { color: #fff; text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); margin-bottom: 10px; }
        .info { color: #fff; margin-top: 20px; font-size: 14px; }
        .score-display {
            font-size: 32px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 10px 0;
        }
        .controls { font-size: 12px; margin: 15px 0; color: #ccc; }
        button {
            padding: 8px 16px;
            background: #0088aa;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover { background: #00aacc; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 TSUNAMI ESCAPE 🌊</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-display" id="score">0</div>
            <div class="controls">
                <p>SPACE to jump, LEFT/RIGHT to move</p>
                <p>Outrun the tsunami!</p>
            </div>
            <button onclick="game.togglePause()">PAUSE</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 400,
            height: 600,
            player: { x: 175, y: 480, width: 20, height: 20, vy: 0, gravity: 0.6, jumpPower: -12, onGround: true },
            platforms: [],
            tsunami: { y: 0, height: 100, speed: 2 },
            score: 0,
            gameRunning: false,
            gamePaused: false,
            frameCount: 0,
            highScore: localStorage.getItem('tsunami-escape-high') || 0,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.generatePlatforms();
                this.startGame();
                this.gameLoop();
            },

            generatePlatforms() {
                this.platforms = [];
                for (let i = 0; i < 15; i++) {
                    this.platforms.push({
                        x: Math.random() * (this.width - 60),
                        y: this.height - (i * 60) - 100,
                        width: 60,
                        height: 12
                    });
                }
            },

            startGame() {
                this.player = { x: 175, y: 480, width: 20, height: 20, vy: 0, gravity: 0.6, jumpPower: -12, onGround: true };
                this.generatePlatforms();
                this.tsunami = { y: this.height - 50, height: 100, speed: 1 };
                this.score = 0;
                this.gameRunning = true;
                this.gamePaused = false;
                this.frameCount = 0;
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                // Handle input
                if (this.keys['ArrowLeft'] || this.keys['a']) {
                    if (this.player.x > 0) this.player.x -= 4;
                }
                if (this.keys['ArrowRight'] || this.keys['d']) {
                    if (this.player.x + this.player.width < this.width) this.player.x += 4;
                }
                if ((this.keys[' '] || this.keys['w']) && this.player.onGround) {
                    this.player.vy = this.player.jumpPower;
                    this.player.onGround = false;
                }

                // Physics
                this.player.vy += this.player.gravity;
                this.player.y += this.player.vy;

                // Platform collision
                this.player.onGround = false;
                for (let platform of this.platforms) {
                    if (this.player.vy >= 0 &&
                        this.player.y + this.player.height >= platform.y &&
                        this.player.y + this.player.height <= platform.y + platform.height + 10 &&
                        this.player.x + this.player.width > platform.x &&
                        this.player.x < platform.x + platform.width) {
                        this.player.vy = 0;
                        this.player.y = platform.y - this.player.height;
                        this.player.onGround = true;
                    }
                }

                // Update tsunami
                this.tsunami.speed = 1 + this.score / 300;
                this.tsunami.y += this.tsunami.speed;

                // Score
                this.frameCount++;
                this.score = Math.floor(this.frameCount / 10);

                // Check if caught by tsunami
                if (this.player.y + this.player.height > this.tsunami.y) {
                    this.endGame();
                }

                // Game over if falling
                if (this.player.y > this.height) {
                    this.endGame();
                }

                // Generate new platforms
                if (this.platforms.length > 0) {
                    const topmost = Math.min(...this.platforms.map(p => p.y));
                    if (topmost > 100) {
                        this.platforms.push({
                            x: Math.random() * (this.width - 60),
                            y: topmost - 60,
                            width: 60,
                            height: 12
                        });
                    }
                    this.platforms = this.platforms.filter(p => p.y < this.height + 50);
                }
            },

            endGame() {
                this.gameRunning = false;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('tsunami-escape-high', this.highScore);
                }
            },

            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                } else {
                    this.startGame();
                }
            },

            draw() {
                // Sky
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.height);
                gradient.addColorStop(0, '#87ceeb');
                gradient.addColorStop(Math.max(0, Math.min(1, this.tsunami.y / this.height)), '#87ceeb');
                gradient.addColorStop(1, '#0099cc');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Draw platforms
                this.ctx.fillStyle = '#8b6f47';
                for (let p of this.platforms) {
                    this.ctx.fillRect(p.x, p.y, p.width, p.height);
                    this.ctx.strokeStyle = '#5d4b38';
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(p.x, p.y, p.width, p.height);
                }

                // Draw tsunami
                this.ctx.fillStyle = 'rgba(0, 100, 200, 0.7)';
                this.ctx.fillRect(0, this.tsunami.y, this.width, this.tsunami.height);

                // Tsunami waves
                this.ctx.strokeStyle = '#00ffff';
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.moveTo(0, this.tsunami.y);
                for (let x = 0; x <= this.width; x += 20) {
                    const wave = Math.sin((x / 40) + this.frameCount * 0.1) * 10;
                    this.ctx.lineTo(x, this.tsunami.y + wave);
                }
                this.ctx.stroke();

                // Draw player (surfer)
                this.ctx.fillStyle = '#ffff00';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                this.ctx.fillStyle = '#ffcc00';
                this.ctx.fillRect(this.player.x + 2, this.player.y + 2, 6, 6);

                // Score and info
                this.ctx.fillStyle = '#000';
                this.ctx.font = 'bold 24px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText('Score: ' + this.score, 10, 30);
                this.ctx.fillText('High: ' + this.highScore, 10, 55);

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }

                if (!this.gameRunning && this.score >= 0) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#00ffff';
                    this.ctx.font = 'bold 28px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('WASHED AWAY!', this.width / 2, this.height / 2 - 40);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = '18px Arial';
                    this.ctx.fillText('Score: ' + this.score, this.width / 2, this.height / 2 + 20);
                    this.ctx.fillText('High: ' + this.highScore, this.width / 2, this.height / 2 + 50);
                }

                document.getElementById('score').textContent = this.score;
            },

            setupInput() {
                this.keys = {};
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (e.key === ' ') e.preventDefault();
                });
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
