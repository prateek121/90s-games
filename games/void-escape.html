<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID ESCAPE - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #1a0033, #0a0017);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        canvas#gameCanvas {
            border: 3px solid #ff33ff;
            background: #0a0017;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(255, 51, 255, 0.6);
        }
        .info {
            color: #ff33ff;
            margin-top: 20px;
            font-size: 14px;
        }
        .score-display {
            font-size: 28px;
            font-weight: bold;
            color: #ff33ff;
            margin: 10px 0;
        }
        button {
            padding: 8px 16px;
            background: #ff33ff;
            color: #0a0017;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 10px rgba(255, 51, 255, 0.8); }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #ff33ff;">🌌 VOID ESCAPE 🌌</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-display" id="score">0</div>
            <div style="margin: 10px 0;">Rooms: <span id="rooms">1</span> | Keys: <span id="keys">0</span>/3 | High: <span id="highScore">0</span></div>
            <p style="margin: 10px 0;">Arrow Keys to move • Collect keys and find the exit</p>
            <button onclick="game.togglePause()">PAUSE</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 400,
            height: 600,

            player: { x: 175, y: 550, width: 20, height: 20, speed: 3 },
            rooms: [],
            currentRoom: 0,
            keys: [],
            keysCollected: 0,
            exit: null,
            particles: [],
            score: 0,
            highScore: localStorage.getItem('voidEscapeHigh') || 0,
            gameRunning: false,
            gamePaused: false,
            gameOver: false,
            levelComplete: false,
            levelCompleteTimer: 0,
            frameCount: 0,
            keys_map: {},

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.startGame();
                this.gameLoop();
                document.getElementById('highScore').textContent = this.highScore;
            },

            startGame() {
                this.player = { x: 175, y: 550, width: 20, height: 20, speed: 3 };
                this.rooms = this.generateRooms();
                this.currentRoom = 0;
                this.keys = [];
                this.keysCollected = 0;
                this.loadRoom(0);
                this.particles = [];
                this.score = 0;
                this.gameRunning = true;
                this.gamePaused = false;
                this.gameOver = false;
                this.levelComplete = false;
                this.levelCompleteTimer = 0;
                this.frameCount = 0;
            },

            generateRooms() {
                const rooms = [];
                for (let roomNum = 0; roomNum < 3; roomNum++) {
                    const walls = [];
                    const keyCount = roomNum + 1;

                    // Random maze pattern
                    const divisions = 2 + roomNum;
                    for (let i = 1; i < divisions; i++) {
                        const x = (i / divisions) * this.width;
                        const gapY = Math.random() * (this.height - 150);
                        const gapHeight = 150;

                        // Top section
                        if (gapY > 50) {
                            walls.push({ x: x - 10, y: 50, width: 20, height: gapY });
                        }
                        // Bottom section
                        if (gapY + gapHeight < this.height - 50) {
                            walls.push({ x: x - 10, y: gapY + gapHeight, width: 20, height: this.height - 50 - (gapY + gapHeight) });
                        }
                    }

                    // Boundary walls
                    walls.push({ x: 0, y: 0, width: 20, height: this.height });
                    walls.push({ x: this.width - 20, y: 0, width: 20, height: this.height });
                    walls.push({ x: 0, y: 0, width: this.width, height: 20 });
                    walls.push({ x: 0, y: this.height - 50, width: this.width, height: 50 });

                    rooms.push({
                        walls,
                        keys: this.generateKeys(roomNum),
                        exit: { x: this.width - 50, y: 25, width: 40, height: 30 }
                    });
                }
                return rooms;
            },

            generateKeys(roomNum) {
                const keys = [];
                const keyCount = Math.min(roomNum + 1, 3);
                for (let i = 0; i < keyCount; i++) {
                    keys.push({
                        x: 50 + Math.random() * (this.width - 100),
                        y: 100 + Math.random() * (this.height - 200),
                        radius: 6,
                        color: `hsl(${i * 120}, 100%, 50%)`,
                        collected: false
                    });
                }
                return keys;
            },

            loadRoom(roomIndex) {
                const room = this.rooms[roomIndex];
                this.keys = room.keys;
                this.exit = room.exit;
                this.keysCollected = 0;
                this.player.x = 30;
                this.player.y = 550;
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                // Player movement
                let newX = this.player.x;
                let newY = this.player.y;

                if (this.keys_map['ArrowLeft']) newX -= this.player.speed;
                if (this.keys_map['ArrowRight']) newX += this.player.speed;
                if (this.keys_map['ArrowUp']) newY -= this.player.speed;
                if (this.keys_map['ArrowDown']) newY += this.player.speed;

                // Collision check
                const testRect = { x: newX, y: newY, width: this.player.width, height: this.player.height };
                if (!this.collidesWithWalls(testRect)) {
                    this.player.x = newX;
                    this.player.y = newY;
                }

                // Key collection
                for (let key of this.keys) {
                    if (!key.collected) {
                        const dist = Math.hypot(this.player.x - key.x, this.player.y - key.y);
                        if (dist < this.player.width / 2 + key.radius) {
                            key.collected = true;
                            this.keysCollected++;
                            this.score += 100;
                            this.createParticles(key.x, key.y, key.color);
                        }
                    }
                }

                // Exit collision (requires keys)
                if (this.keysCollected >= this.keys.length) {
                    if (this.checkCollision(this.player, this.exit)) {
                        this.score += 500;
                        if (this.currentRoom < this.rooms.length - 1) {
                            this.currentRoom++;
                            this.loadRoom(this.currentRoom);
                        } else {
                            this.levelComplete = true;
                            this.levelCompleteTimer = 60;
                            this.score += 2000;
                        }
                    }
                }

                if (this.levelComplete) {
                    this.levelCompleteTimer--;
                    if (this.levelCompleteTimer === 0) {
                        this.endGame();
                    }
                }

                // Particles
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    return p.life > 0;
                });

                document.getElementById('score').textContent = this.score;
                document.getElementById('rooms').textContent = this.currentRoom + 1;
                document.getElementById('keys').textContent = this.keysCollected;
                this.frameCount++;
            },

            collidesWithWalls(rect) {
                for (let wall of this.rooms[this.currentRoom].walls) {
                    if (rect.x < wall.x + wall.width &&
                        rect.x + rect.width > wall.x &&
                        rect.y < wall.y + wall.height &&
                        rect.y + rect.height > wall.y) {
                        return true;
                    }
                }
                return false;
            },

            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            },

            createParticles(x, y, color) {
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2;
                    this.particles.push({
                        x, y,
                        vx: Math.cos(angle) * 2,
                        vy: Math.sin(angle) * 2,
                        life: 20,
                        color
                    });
                }
            },

            endGame() {
                this.gameRunning = false;
                this.gameOver = true;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('voidEscapeHigh', this.highScore);
                    document.getElementById('highScore').textContent = this.highScore;
                }
            },

            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                } else {
                    this.startGame();
                }
            },

            draw() {
                // Void background
                const gradient = this.ctx.createRadialGradient(this.width / 2, this.height / 2, 0, this.width / 2, this.height / 2, 500);
                gradient.addColorStop(0, '#3a1a6a');
                gradient.addColorStop(1, '#0a0017');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Void particles
                this.ctx.fillStyle = '#ff33ff';
                for (let i = 0; i < 10; i++) {
                    const x = (this.frameCount * 0.05 + i * 40) % this.width;
                    const y = (i * 60) % this.height;
                    this.ctx.globalAlpha = 0.3;
                    this.ctx.fillRect(x, y, 2, 2);
                    this.ctx.globalAlpha = 1;
                }

                // Walls
                this.ctx.fillStyle = '#ff33ff';
                for (let wall of this.rooms[this.currentRoom].walls) {
                    this.ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
                    this.ctx.strokeStyle = '#ff66ff';
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(wall.x, wall.y, wall.width, wall.height);
                }

                // Exit
                if (this.keysCollected >= this.keys.length) {
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.fillRect(this.exit.x, this.exit.y, this.exit.width, this.exit.height);
                    this.ctx.strokeStyle = '#00aa00';
                    this.ctx.lineWidth = 3;
                    this.ctx.strokeRect(this.exit.x, this.exit.y, this.exit.width, this.exit.height);
                    this.ctx.font = 'bold 12px Arial';
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('EXIT', this.exit.x + this.exit.width / 2, this.exit.y + 20);
                } else {
                    this.ctx.fillStyle = 'rgba(255, 51, 255, 0.3)';
                    this.ctx.fillRect(this.exit.x, this.exit.y, this.exit.width, this.exit.height);
                    this.ctx.strokeStyle = 'rgba(255, 51, 255, 0.5)';
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(this.exit.x, this.exit.y, this.exit.width, this.exit.height);
                    this.ctx.font = 'bold 10px Arial';
                    this.ctx.fillStyle = 'rgba(255, 51, 255, 0.5)';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('LOCKED', this.exit.x + this.exit.width / 2, this.exit.y + 20);
                }

                // Keys
                for (let key of this.keys) {
                    if (!key.collected) {
                        this.ctx.fillStyle = key.color;
                        this.ctx.beginPath();
                        this.ctx.arc(key.x, key.y, key.radius, 0, Math.PI * 2);
                        this.ctx.fill();
                        // Glow
                        this.ctx.strokeStyle = key.color;
                        this.ctx.lineWidth = 2;
                        this.ctx.globalAlpha = 0.5;
                        this.ctx.stroke();
                        this.ctx.globalAlpha = 1;
                    }
                }

                // Particles
                for (let p of this.particles) {
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.life / 20;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                }

                // Player
                this.ctx.fillStyle = '#ffff00';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                this.ctx.strokeStyle = '#ffaa00';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(this.player.x, this.player.y, this.player.width, this.player.height);

                // HUD
                this.ctx.fillStyle = '#ff33ff';
                this.ctx.font = 'bold 14px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`Room ${this.currentRoom + 1}/3`, 10, 30);
                this.ctx.fillText(`Keys: ${this.keysCollected}/${this.keys.length}`, 10, 50);

                if (this.levelComplete) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.font = 'bold 28px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('ESCAPED THE VOID!', this.width / 2, this.height / 2 - 40);
                    this.ctx.font = '16px Arial';
                    this.ctx.fillText(`Final Score: ${this.score}`, this.width / 2, this.height / 2 + 30);
                }

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#ff33ff';
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }
            },

            setupInput() {
                document.addEventListener('keydown', (e) => {
                    this.keys_map[e.key] = true;
                    if (e.key === ' ') {
                        e.preventDefault();
                        this.togglePause();
                    }
                });
                document.addEventListener('keyup', (e) => {
                    this.keys_map[e.key] = false;
                });
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
