<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA STRIKE - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0a0e27, #1a1f3a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 15px;
            font-family: monospace;
        }
        canvas#gameCanvas {
            border: 3px solid #00ff00;
            background: linear-gradient(to bottom, #0a0e27, #1a1f3a);
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .info {
            color: #00ff00;
            margin-top: 20px;
            font-size: 14px;
            font-family: monospace;
        }
        .score-display {
            font-size: 28px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            margin: 10px 0;
        }
        .controls {
            font-size: 12px;
            margin: 15px 0;
            color: #00aa00;
        }
        button {
            padding: 8px 16px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
            font-family: monospace;
        }
        button:hover { background: #00cc00; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ NOVA STRIKE ⚡</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-display" id="score">0</div>
            <div class="controls">
                <p>ARROW KEYS to move | SPACE to shoot</p>
                <p>Destroy enemies! Avoid asteroids!</p>
            </div>
            <button onclick="game.togglePause()">PAUSE</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 400,
            height: 600,

            player: { x: 180, y: 550, width: 40, height: 40, speed: 5 },
            bullets: [],
            enemies: [],
            asteroids: [],
            score: 0,
            lives: 3,
            gameRunning: false,
            gamePaused: false,
            gameOver: false,
            frameCount: 0,
            level: 1,
            keys: {},

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.startGame();
                this.gameLoop();
            },

            startGame() {
                this.player = { x: 180, y: 550, width: 40, height: 40, speed: 5 };
                this.bullets = [];
                this.enemies = [];
                this.asteroids = [];
                this.score = 0;
                this.lives = 3;
                this.gameRunning = true;
                this.gamePaused = false;
                this.gameOver = false;
                this.frameCount = 0;
                this.level = 1;
                this.spawnInitialEnemies();
            },

            spawnInitialEnemies() {
                for (let i = 0; i < 3 + this.level; i++) {
                    this.enemies.push({
                        x: Math.random() * (this.width - 30),
                        y: Math.random() * 100,
                        width: 30,
                        height: 30,
                        vy: 2 + this.level * 0.5,
                        vx: (Math.random() - 0.5) * 2
                    });
                }
            },

            spawnAsteroid() {
                this.asteroids.push({
                    x: Math.random() * (this.width - 20),
                    y: -20,
                    width: 20,
                    height: 20,
                    vy: 3 + this.level * 0.3
                });
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                // Player movement
                if (this.keys['ArrowLeft'] && this.player.x > 0) {
                    this.player.x -= this.player.speed;
                }
                if (this.keys['ArrowRight'] && this.player.x < this.width - this.player.width) {
                    this.player.x += this.player.speed;
                }

                // Update bullets
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    this.bullets[i].y -= 8;
                    if (this.bullets[i].y < 0) {
                        this.bullets.splice(i, 1);
                    }
                }

                // Spawn enemies
                this.frameCount++;
                if (this.frameCount % 60 === 0 && this.enemies.length < 5 + this.level) {
                    this.enemies.push({
                        x: Math.random() * (this.width - 30),
                        y: -30,
                        width: 30,
                        height: 30,
                        vy: 2 + this.level * 0.5,
                        vx: (Math.random() - 0.5) * 2
                    });
                }

                // Spawn asteroids occasionally
                if (this.frameCount % 120 === 0) {
                    this.spawnAsteroid();
                }

                // Update enemies
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const enemy = this.enemies[i];
                    enemy.y += enemy.vy;
                    enemy.x += enemy.vx;

                    if (enemy.x < 0 || enemy.x > this.width - enemy.width) {
                        enemy.vx *= -1;
                    }

                    if (enemy.y > this.height) {
                        this.enemies.splice(i, 1);
                        this.lives--;
                        if (this.lives <= 0) {
                            this.endGame();
                        }
                        continue;
                    }

                    // Check bullet collision
                    for (let j = this.bullets.length - 1; j >= 0; j--) {
                        const bullet = this.bullets[j];
                        if (this.checkCollision(bullet, enemy)) {
                            this.enemies.splice(i, 1);
                            this.bullets.splice(j, 1);
                            this.score += 10;
                            break;
                        }
                    }
                }

                // Update asteroids
                for (let i = this.asteroids.length - 1; i >= 0; i--) {
                    const asteroid = this.asteroids[i];
                    asteroid.y += asteroid.vy;

                    if (asteroid.y > this.height) {
                        this.asteroids.splice(i, 1);
                        continue;
                    }

                    // Check player collision
                    if (this.checkCollision(asteroid, this.player)) {
                        this.asteroids.splice(i, 1);
                        this.lives--;
                        if (this.lives <= 0) {
                            this.endGame();
                        }
                    }
                }

                // Level up
                if (this.enemies.length === 0 && this.frameCount % 30 === 0) {
                    this.level++;
                    this.spawnInitialEnemies();
                }
            },

            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            },

            shoot() {
                if (this.gameRunning && !this.gamePaused) {
                    this.bullets.push({
                        x: this.player.x + this.player.width / 2 - 2,
                        y: this.player.y - 10,
                        width: 4,
                        height: 10
                    });
                }
            },

            endGame() {
                this.gameRunning = false;
                this.gameOver = true;
            },

            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                } else {
                    this.startGame();
                }
            },

            draw() {
                // Star field background
                this.ctx.fillStyle = '#0a0e27';
                this.ctx.fillRect(0, 0, this.width, this.height);

                for (let i = 0; i < 100; i++) {
                    this.ctx.fillStyle = '#fff';
                    const x = (i * 50 + this.frameCount / 2) % this.width;
                    const y = (i * 30 + this.frameCount / 3) % this.height;
                    this.ctx.fillRect(x, y, 1, 1);
                }

                // Player
                this.ctx.fillStyle = '#00ff00';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                this.ctx.fillStyle = '#00ff00';
                this.ctx.fillRect(this.player.x + 15, this.player.y - 8, 10, 8);

                // Bullets
                this.ctx.fillStyle = '#ffff00';
                for (let bullet of this.bullets) {
                    this.ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                }

                // Enemies
                this.ctx.fillStyle = '#ff0000';
                for (let enemy of this.enemies) {
                    this.ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                    this.ctx.fillStyle = '#ff6666';
                    this.ctx.fillRect(enemy.x + 5, enemy.y + 5, 10, 10);
                    this.ctx.fillRect(enemy.x + 15, enemy.y + 5, 10, 10);
                    this.ctx.fillStyle = '#ff0000';
                }

                // Asteroids
                this.ctx.fillStyle = '#aa8800';
                for (let asteroid of this.asteroids) {
                    this.ctx.fillRect(asteroid.x, asteroid.y, asteroid.width, asteroid.height);
                }

                // HUD
                this.ctx.fillStyle = '#00ff00';
                this.ctx.font = 'bold 16px monospace';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`Score: ${this.score}`, 10, 25);
                this.ctx.fillText(`Lives: ${this.lives}`, 10, 50);
                this.ctx.fillText(`Level: ${this.level}`, 10, 75);

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.font = 'bold 24px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }

                if (this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#ff0000';
                    this.ctx.font = 'bold 24px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('GAME OVER', this.width / 2, this.height / 2 - 30);
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.font = '18px monospace';
                    this.ctx.fillText(`Final Score: ${this.score}`, this.width / 2, this.height / 2 + 30);
                }

                document.getElementById('score').textContent = this.score;
            },

            setupInput() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (e.key === ' ') {
                        this.shoot();
                        e.preventDefault();
                    }
                });
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
