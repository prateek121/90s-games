<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BREAKOUT - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        canvas#gameCanvas {
            border: 4px solid #fff;
            background: #1a1a2e;
            display: block;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .info {
            color: white;
            min-width: 250px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .stat-label { font-size: 12px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .stat-value { font-size: 28px; font-family: monospace; font-weight: bold; }
        button {
            width: 100%;
            padding: 10px;
            background: #fff;
            color: #667eea;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            border-radius: 4px;
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.05); }
        .controls {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            padding: 12px;
            font-size: 11px;
            border-radius: 4px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .powerup-display {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            padding: 12px;
            font-size: 11px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="info">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Lives</div>
                <div class="stat-value" id="lives">3</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Bricks</div>
                <div class="stat-value" id="bricks">30</div>
            </div>
            <div class="controls">
                <strong>CONTROLS:</strong>
                <p>← → - Move paddle</p>
                <p>SPACE - Fire ball</p>
                <p>P - Pause</p>
            </div>
            <div class="powerup-display">
                <strong>ACTIVE POWERUP:</strong>
                <p id="activePowerup">None</p>
            </div>
            <button onclick="game.start()">START GAME</button>
            <button onclick="game.restart()">NEW GAME</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 600,
            height: 400,
            paddleWidth: 70,
            paddleHeight: 12,
            ballRadius: 4,
            brickWidth: 60,
            brickHeight: 12,

            paddle: null,
            ball: null,
            bricks: [],
            powerups: [],
            particles: [],

            score: 0,
            level: 1,
            lives: 3,
            gameRunning: false,
            gamePaused: false,
            gameOver: false,
            ballLaunched: false,
            activePowerup: null,
            powerupTimer: 0,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.paddle = { x: this.width / 2 - this.paddleWidth / 2, y: this.height - 30 };
                this.ball = { x: this.paddle.x + this.paddleWidth / 2, y: this.paddle.y - 10, vx: 0, vy: 0 };
                this.setupInput();
                this.createBricks();
                this.gameLoop();
            },

            createBricks() {
                this.bricks = [];
                const cols = Math.floor(this.width / this.brickWidth);
                const rows = 5 + Math.floor(this.level / 2);
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        this.bricks.push({
                            x: col * this.brickWidth,
                            y: 40 + row * this.brickHeight,
                            width: this.brickWidth,
                            height: this.brickHeight,
                            health: Math.min(3, 1 + Math.floor(this.level / 3)),
                            color: `hsl(${Math.random() * 360}, 80%, 50%)`
                        });
                    }
                }
            },

            start() {
                if (!this.gameRunning && !this.ballLaunched) {
                    this.ballLaunched = true;
                    this.gameRunning = true;
                    this.ball.vx = (Math.random() - 0.5) * 4;
                    this.ball.vy = -5;
                }
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                if (this.ballLaunched) {
                    this.ball.x += this.ball.vx;
                    this.ball.y += this.ball.vy;

                    // Ball collision with walls
                    if (this.ball.x - this.ballRadius < 0 || this.ball.x + this.ballRadius > this.width) {
                        this.ball.vx = -this.ball.vx;
                        this.ball.x = Math.max(this.ballRadius, Math.min(this.width - this.ballRadius, this.ball.x));
                    }

                    if (this.ball.y - this.ballRadius < 0) {
                        this.ball.vy = -this.ball.vy;
                    }

                    // Ball collision with paddle
                    if (this.ball.y + this.ballRadius > this.paddle.y &&
                        this.ball.x > this.paddle.x && this.ball.x < this.paddle.x + this.paddleWidth) {
                        this.ball.vy = -Math.abs(this.ball.vy);
                        this.ball.y = this.paddle.y - this.ballRadius;
                        const collidePoint = this.ball.x - (this.paddle.x + this.paddleWidth / 2);
                        this.ball.vx += collidePoint * 0.1;
                    }

                    // Ball collision with bricks
                    for (let i = this.bricks.length - 1; i >= 0; i--) {
                        const brick = this.bricks[i];
                        if (this.ball.x > brick.x && this.ball.x < brick.x + brick.width &&
                            this.ball.y > brick.y && this.ball.y < brick.y + brick.height) {

                            brick.health--;
                            if (brick.health <= 0) {
                                this.bricks.splice(i, 1);
                                this.score += 100 * this.level;
                                if (Math.random() < 0.1) this.spawnPowerup(brick.x, brick.y);
                            }
                            this.ball.vy = -this.ball.vy;
                            break;
                        }
                    }

                    // Ball out of bounds
                    if (this.ball.y > this.height) {
                        this.lives--;
                        if (this.lives <= 0) {
                            this.gameOver = true;
                            this.gameRunning = false;
                        } else {
                            this.resetBall();
                        }
                    }

                    // Level complete
                    if (this.bricks.length === 0) {
                        this.level++;
                        this.createBricks();
                        this.resetBall();
                    }
                }

                // Update powerups
                for (let i = this.powerups.length - 1; i >= 0; i--) {
                    const pu = this.powerups[i];
                    pu.y += 2;
                    if (pu.y > this.paddle.y - 10 && pu.y < this.paddle.y + 20 &&
                        pu.x > this.paddle.x && pu.x < this.paddle.x + this.paddleWidth) {
                        this.activatePowerup(pu.type);
                        this.powerups.splice(i, 1);
                    } else if (pu.y > this.height) {
                        this.powerups.splice(i, 1);
                    }
                }

                // Update powerup timer
                if (this.powerupTimer > 0) {
                    this.powerupTimer--;
                    if (this.powerupTimer === 0) {
                        this.activePowerup = null;
                        this.paddleWidth = 70;
                    }
                }
            },

            resetBall() {
                this.ball.x = this.paddle.x + this.paddleWidth / 2;
                this.ball.y = this.paddle.y - 10;
                this.ball.vx = 0;
                this.ball.vy = 0;
                this.ballLaunched = false;
            },

            spawnPowerup(x, y) {
                const types = ['expand', 'slow', 'fast', 'multi'];
                this.powerups.push({
                    x, y,
                    type: types[Math.floor(Math.random() * types.length)],
                    size: 10
                });
            },

            activatePowerup(type) {
                this.activePowerup = type;
                this.powerupTimer = 300;
                switch(type) {
                    case 'expand': this.paddleWidth = 100; break;
                    case 'slow': this.ball.vx *= 0.7; this.ball.vy *= 0.7; break;
                    case 'fast': this.ball.vx *= 1.3; this.ball.vy *= 1.3; break;
                    case 'multi': this.score += 500; break;
                }
            },

            draw() {
                this.ctx.fillStyle = '#1a1a2e';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Paddle
                this.ctx.fillStyle = '#00ff00';
                this.ctx.fillRect(this.paddle.x, this.paddle.y, this.paddleWidth, this.paddleHeight);

                // Ball
                this.ctx.fillStyle = '#ffff00';
                this.ctx.beginPath();
                this.ctx.arc(this.ball.x, this.ball.y, this.ballRadius, 0, Math.PI * 2);
                this.ctx.fill();

                // Bricks
                for (let brick of this.bricks) {
                    this.ctx.fillStyle = brick.color;
                    this.ctx.globalAlpha = brick.health / 3;
                    this.ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    this.ctx.globalAlpha = 1;
                }

                // Powerups
                for (let pu of this.powerups) {
                    this.ctx.fillStyle = '#ff00ff';
                    this.ctx.fillRect(pu.x - pu.size / 2, pu.y, pu.size, pu.size);
                }

                // HUD
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '12px Arial';
                this.ctx.fillText(`Score: ${this.score}`, 10, 20);
                this.ctx.fillText(`Lives: ${this.lives}`, 150, 20);
                this.ctx.fillText(`Level: ${this.level}`, 250, 20);

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 20px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                    this.ctx.textAlign = 'left';
                }

                if (this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('GAME OVER', this.width / 2, this.height / 2 - 20);
                    this.ctx.font = '14px Arial';
                    this.ctx.fillText(`Final Score: ${this.score}`, this.width / 2, this.height / 2 + 20);
                    this.ctx.textAlign = 'left';
                }

                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lives').textContent = this.lives;
                document.getElementById('bricks').textContent = this.bricks.length;
                document.getElementById('activePowerup').textContent = this.activePowerup || 'None';
            },

            setupInput() {
                const keys = {};
                document.addEventListener('keydown', (e) => {
                    keys[e.key.toLowerCase()] = true;
                    if (e.key === ' ') { this.start(); e.preventDefault(); }
                    if (e.key.toLowerCase() === 'p') { this.gamePaused = !this.gamePaused; }
                });
                document.addEventListener('keyup', (e) => {
                    keys[e.key.toLowerCase()] = false;
                });

                setInterval(() => {
                    if (keys['arrowleft']) this.paddle.x = Math.max(0, this.paddle.x - 6);
                    if (keys['arrowright']) this.paddle.x = Math.min(this.width - this.paddleWidth, this.paddle.x + 6);
                }, 16);
            },

            restart() {
                this.score = 0;
                this.level = 1;
                this.lives = 3;
                this.gameRunning = false;
                this.gamePaused = false;
                this.gameOver = false;
                this.ballLaunched = false;
                this.activePowerup = null;
                this.paddle = { x: this.width / 2 - this.paddleWidth / 2, y: this.height - 30 };
                this.resetBall();
                this.createBricks();
                this.powerups = [];
                this.draw();
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
