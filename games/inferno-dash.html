<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFERNO DASH - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b00, #ff0000);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { text-align: center; }
        canvas#gameCanvas {
            border: 3px solid #fff;
            background: linear-gradient(to bottom, #ffcc00, #ff6600);
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(255, 100, 0, 0.8);
        }
        h1 { color: #fff; text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); margin-bottom: 10px; }
        .info { color: #fff; margin-top: 20px; font-size: 14px; }
        .score-display {
            font-size: 32px;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 10px 0;
        }
        .controls { font-size: 12px; margin: 15px 0; color: #eee; }
        button {
            padding: 8px 16px;
            background: #ff6600;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover { background: #ff8800; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 INFERNO DASH 🔥</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-display" id="score">0</div>
            <div class="controls">
                <p>LEFT/RIGHT ARROW or A/D to move</p>
                <p>Dodge the lava and fire!</p>
            </div>
            <button onclick="game.togglePause()">PAUSE</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 400,
            height: 600,
            player: { x: 175, y: 550, width: 30, height: 30, speed: 5 },
            obstacles: [],
            particles: [],
            score: 0,
            gameRunning: false,
            gamePaused: false,
            gameOver: false,
            frameCount: 0,
            difficulty: 1,
            highScore: localStorage.getItem('inferno-dash-high') || 0,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.startGame();
                this.gameLoop();
            },

            startGame() {
                this.player = { x: 175, y: 550, width: 30, height: 30, speed: 5 };
                this.obstacles = [];
                this.particles = [];
                this.score = 0;
                this.gameRunning = true;
                this.gamePaused = false;
                this.gameOver = false;
                this.frameCount = 0;
                this.difficulty = 1;
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                // Handle input
                if (this.keys['ArrowLeft'] || this.keys['a']) {
                    if (this.player.x > 0) this.player.x -= this.player.speed;
                }
                if (this.keys['ArrowRight'] || this.keys['d']) {
                    if (this.player.x + this.player.width < this.width) this.player.x += this.player.speed;
                }

                // Spawn obstacles
                this.frameCount++;
                const spawnRate = Math.max(25, 60 - Math.floor(this.score / 50) * 5);
                if (this.frameCount % spawnRate === 0) {
                    const x = Math.random() * (this.width - 30);
                    const type = Math.random() > 0.3 ? 'lava' : 'fire';
                    this.obstacles.push({ x, y: -30, width: 30, height: 30, type, vy: 3 + this.score / 200 });
                }

                // Update obstacles
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obs = this.obstacles[i];
                    obs.y += obs.vy;

                    if (obs.y > this.height) {
                        this.obstacles.splice(i, 1);
                        this.score++;
                        if (this.score % 10 === 0) this.difficulty += 0.1;
                    } else {
                        if (this.checkCollision(this.player, obs)) {
                            this.endGame();
                        }
                    }
                }

                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.y -= p.vy;
                    p.vy -= 0.1;
                    p.life--;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            },

            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            },

            createExplosion(x, y, color) {
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x: x + Math.random() * 20 - 10,
                        y: y + Math.random() * 20 - 10,
                        vy: Math.random() * 3 + 1,
                        life: 30,
                        color
                    });
                }
            },

            endGame() {
                this.gameRunning = false;
                this.gameOver = true;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('inferno-dash-high', this.highScore);
                }
            },

            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                } else {
                    this.startGame();
                }
            },

            draw() {
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.height);
                gradient.addColorStop(0, '#ffcc00');
                gradient.addColorStop(0.5, '#ff8800');
                gradient.addColorStop(1, '#ff6600');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Draw obstacles
                for (let obs of this.obstacles) {
                    if (obs.type === 'lava') {
                        this.ctx.fillStyle = '#ff3300';
                        this.ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                        this.ctx.fillStyle = '#ffff00';
                        this.ctx.fillRect(obs.x + 5, obs.y + 5, 8, 8);
                    } else {
                        this.ctx.fillStyle = '#ff6600';
                        this.ctx.beginPath();
                        this.ctx.moveTo(obs.x + 15, obs.y);
                        this.ctx.lineTo(obs.x + 30, obs.y + 15);
                        this.ctx.lineTo(obs.x + 15, obs.y + 30);
                        this.ctx.lineTo(obs.x, obs.y + 15);
                        this.ctx.fill();
                    }
                }

                // Draw particles
                for (let p of this.particles) {
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.life / 30;
                    this.ctx.fillRect(p.x, p.y, 4, 4);
                    this.ctx.globalAlpha = 1;
                }

                // Draw player
                this.ctx.fillStyle = '#0099ff';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                this.ctx.fillStyle = '#00ddff';
                this.ctx.fillRect(this.player.x + 5, this.player.y + 5, 8, 8);
                this.ctx.fillRect(this.player.x + 17, this.player.y + 5, 8, 8);

                // Score and info
                this.ctx.fillStyle = '#fff';
                this.ctx.font = 'bold 24px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText('Score: ' + this.score, 10, 30);
                this.ctx.fillText('High: ' + this.highScore, 10, 55);

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }

                if (this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#ffff00';
                    this.ctx.font = 'bold 28px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('GAME OVER', this.width / 2, this.height / 2 - 40);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = '18px Arial';
                    this.ctx.fillText('Score: ' + this.score, this.width / 2, this.height / 2 + 20);
                    this.ctx.fillText('High: ' + this.highScore, this.width / 2, this.height / 2 + 50);
                }

                document.getElementById('score').textContent = this.score;
            },

            setupInput() {
                this.keys = {};
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                });
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
