<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Hell - Action Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2a0a2a 0%, #0a2a3a 100%);
            font-family: 'Arial', sans-serif;
            color: #00ffff;
            overflow: hidden;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            text-align: center;
            text-shadow: 0 0 15px #00ffff;
            border: 3px solid #00ffff;
            padding: 15px 30px;
            background: rgba(0, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 1.2em;
        }

        .stat {
            border: 2px solid #00ffff;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.05);
        }

        .stat span {
            color: #ffff00;
            font-weight: bold;
        }

        #canvas {
            border: 4px solid #00ffff;
            background: #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
        }

        .message {
            min-height: 25px;
            font-size: 1.3em;
            text-shadow: 0 0 10px currentColor;
        }

        .message.success {
            color: #00ff00;
        }

        .message.error {
            color: #ff4444;
        }

        .controls {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #00ffff, #0088ff);
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .instruction {
            text-align: center;
            color: #00ffff;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="header">
            <h1>BULLET HELL</h1>
        </div>
        <div class="stats">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Lives: <span id="lives">3</span></div>
            <div class="stat">Wave: <span id="wave">1</span></div>
        </div>
        <div class="instruction">Dodge the bullets! Use arrow keys or mouse</div>
        <canvas id="canvas" width="800" height="500"></canvas>
        <div class="message" id="message"></div>
        <div class="controls">
            <button onclick="game.reset()">New Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 40;
                this.width = 30;
                this.height = 30;
                this.speed = 5;
                this.vx = 0;
                this.vy = 0;
            }

            update(keys) {
                if (keys['ArrowLeft']) this.vx = -this.speed;
                if (keys['ArrowRight']) this.vx = this.speed;
                if (keys['ArrowUp']) this.vy = -this.speed;
                if (keys['ArrowDown']) this.vy = this.speed;

                if (!keys['ArrowLeft'] && !keys['ArrowRight']) this.vx *= 0.9;
                if (!keys['ArrowUp'] && !keys['ArrowDown']) this.vy *= 0.9;

                this.x += this.vx;
                this.y += this.vy;

                this.x = Math.max(this.width / 2, Math.min(canvas.width - this.width / 2, this.x));
                this.y = Math.max(this.height / 2, Math.min(canvas.height - this.height / 2, this.y));
            }

            draw(ctx) {
                ctx.fillStyle = '#00ff00';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.width / 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.width / 2, 0, Math.PI * 2);
                ctx.stroke();
            }

            getCollisionRadius() {
                return this.width / 2;
            }
        }

        class Bullet {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = 5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }

            draw(ctx) {
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            isOffScreen() {
                return this.x < 0 || this.x > canvas.width ||
                       this.y < 0 || this.y > canvas.height;
            }

            collidesWith(player) {
                const dx = this.x - player.x;
                const dy = this.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                return distance < this.radius + player.getCollisionRadius();
            }
        }

        class Enemy {
            constructor(x, y, wave) {
                this.x = x;
                this.y = y;
                this.wave = wave;
                this.shootTimer = Math.random() * 30;
                this.moveTimer = 0;
                this.vx = (Math.random() - 0.5) * 2;
            }

            update() {
                this.x += this.vx;
                if (this.x < 30 || this.x > canvas.width - 30) {
                    this.vx *= -1;
                }
                this.shootTimer--;
                this.moveTimer++;
            }

            draw(ctx) {
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(this.x - 20, this.y - 20, 40, 40);

                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x - 20, this.y - 20, 40, 40);
            }

            shouldShoot() {
                return this.shootTimer <= 0;
            }

            resetShootTimer() {
                this.shootTimer = Math.max(15, 60 - this.wave * 5);
            }
        }

        class BulletHell {
            constructor() {
                this.player = new Player();
                this.score = 0;
                this.lives = 3;
                this.wave = 1;
                this.gameActive = true;
                this.bullets = [];
                this.enemies = [];
                this.keys = {};
                this.waveTimer = 0;
                this.waveEnemyCount = 3 + this.wave;

                this.init();
                this.setupEventListeners();
            }

            init() {
                this.enemies = [];
                for (let i = 0; i < this.waveEnemyCount; i++) {
                    const x = 100 + (i % 4) * 150;
                    const y = 40 + Math.floor(i / 4) * 60;
                    this.enemies.push(new Enemy(x, y, this.wave));
                }
            }

            setupEventListeners() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                });

                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });

                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    this.player.x = e.clientX - rect.left;
                });
            }

            update() {
                if (!this.gameActive) return;

                this.player.update(this.keys);

                this.enemies.forEach(enemy => {
                    enemy.update();
                    if (enemy.shouldShoot()) {
                        const vx = (this.player.x - enemy.x) * 0.02;
                        const vy = 3;
                        this.bullets.push(new Bullet(enemy.x, enemy.y, vx, vy));
                        enemy.resetShootTimer();
                    }
                });

                this.bullets = this.bullets.filter(bullet => {
                    bullet.update();
                    if (bullet.collidesWith(this.player)) {
                        this.lives--;
                        return false;
                    }
                    return !bullet.isOffScreen();
                });

                this.waveTimer++;
                if (this.waveTimer % 6 === 0) this.score++;
                if (this.waveTimer > 60 * 20) {
                    this.waveTimer = 0;
                    this.nextWave();
                }

                if (this.enemies.length === 0) {
                    this.nextWave();
                }

                if (this.lives <= 0) {
                    this.endGame();
                }

                this.updateUI();
            }

            nextWave() {
                this.wave++;
                this.waveEnemyCount = Math.min(10, 3 + this.wave);
                this.score += 100 * this.wave;
                document.getElementById('message').textContent = `Wave ${this.wave}!`;
                document.getElementById('message').className = 'message success';
                this.init();
            }

            endGame() {
                this.gameActive = false;
                document.getElementById('message').textContent = `Game Over! Score: ${this.score}`;
                document.getElementById('message').className = 'message error';
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('lives').textContent = this.lives;
                document.getElementById('wave').textContent = this.wave;
            }

            draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                this.player.draw(ctx);
                this.enemies.forEach(enemy => enemy.draw(ctx));
                this.bullets.forEach(bullet => bullet.draw(ctx));
            }

            animate() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.animate());
            }

            reset() {
                this.player = new Player();
                this.score = 0;
                this.lives = 3;
                this.wave = 1;
                this.gameActive = true;
                this.bullets = [];
                this.waveEnemyCount = 3 + this.wave;
                document.getElementById('message').textContent = '';
                this.init();
            }
        }

        const game = new BulletHell();
        game.animate();

        function saveHighScore() {
            const existing = parseInt(localStorage.getItem('bulletHellHighScore') || '0');
            if (game.score > existing) {
                localStorage.setItem('bulletHellHighScore', game.score);
            }
        }

        window.addEventListener('beforeunload', saveHighScore);
    </script>
</body>
</html>
