<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SURGE - 90s Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a4d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        canvas#gameCanvas {
            border: 3px solid #00ffff;
            background: #000;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        .info {
            color: #00ffff;
            margin-top: 20px;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .score-display {
            font-size: 32px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            margin: 10px 0;
        }
        .controls {
            font-size: 12px;
            margin: 15px 0;
            color: #00ffff;
        }
        button {
            padding: 8px 16px;
            background: #00ffff;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        button:hover {
            background: #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #00ffff; text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);">⚡ NEON SURGE ⚡</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-display" id="score">0</div>
            <div class="controls">
                <p>ARROW KEYS to move</p>
                <p>Dodge the enemies!</p>
            </div>
            <button onclick="game.togglePause()">PAUSE</button>
            <button onclick="location.href='../'">BACK</button>
        </div>
    </div>

    <script>
        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            width: 400,
            height: 600,

            player: { x: 175, y: 550, width: 50, height: 30, speed: 5 },
            enemies: [],
            powerUps: [],
            particles: [],
            score: 0,
            lives: 3,
            gameRunning: false,
            gamePaused: false,
            gameOver: false,
            frameCount: 0,
            level: 1,
            highScore: localStorage.getItem('neonSurgeHigh') || 0,
            difficulty: 1,

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.setupInput();
                this.startGame();
                this.gameLoop();
            },

            startGame() {
                this.player = { x: 175, y: 550, width: 50, height: 30, speed: 5 };
                this.enemies = [];
                this.powerUps = [];
                this.particles = [];
                this.score = 0;
                this.lives = 3;
                this.level = 1;
                this.difficulty = 1;
                this.gameRunning = true;
                this.gamePaused = false;
                this.gameOver = false;
                this.frameCount = 0;
            },

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                this.frameCount++;
                this.difficulty = 1 + this.score / 200;

                // Level up every 10 points
                const newLevel = Math.floor(this.score / 10) + 1;
                if (newLevel > this.level) {
                    this.level = newLevel;
                    this.spawnPowerUp();
                }

                // Generate enemies
                const spawnRate = Math.max(20, 40 - this.score / 50);
                if (this.frameCount % spawnRate === 0) {
                    const x = Math.random() * (this.width - 30);
                    this.enemies.push({ x: x, y: -30, width: 30, height: 30, speed: 3 + this.difficulty * 0.5 });
                }

                // Update enemies
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const enemy = this.enemies[i];
                    enemy.y += enemy.speed;

                    // Collision check
                    if (this.collides(this.player, enemy)) {
                        this.lives--;
                        this.createExplosion(this.player.x + 25, this.player.y + 15);
                        if (this.lives <= 0) {
                            this.endGame();
                            return;
                        } else {
                            this.enemies.splice(i, 1);
                        }
                        continue;
                    }

                    // Score when enemy passes
                    if (enemy.y > this.height && !enemy.scored) {
                        enemy.scored = true;
                        this.score++;
                    }

                    // Remove off-screen enemies
                    if (enemy.y > this.height) {
                        this.enemies.splice(i, 1);
                    }
                }

                // Update power-ups
                for (let i = this.powerUps.length - 1; i >= 0; i--) {
                    const pu = this.powerUps[i];
                    pu.y += 2;

                    if (this.collides(this.player, pu)) {
                        this.score += 50;
                        this.createExplosion(pu.x, pu.y);
                        this.powerUps.splice(i, 1);
                        continue;
                    }

                    if (pu.y > this.height) {
                        this.powerUps.splice(i, 1);
                    }
                }

                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            },

            spawnPowerUp() {
                const x = Math.random() * (this.width - 20);
                this.powerUps.push({ x: x, y: -20, width: 20, height: 20 });
            },

            createExplosion(x, y) {
                for (let i = 0; i < 10; i++) {
                    const angle = (Math.PI * 2 * i) / 10;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * 3,
                        vy: Math.sin(angle) * 3,
                        life: 20
                    });
                }
            },

            collides(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            },

            endGame() {
                this.gameRunning = false;
                this.gameOver = true;
                this.createExplosion(this.player.x + 25, this.player.y + 15);
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('neonSurgeHigh', this.highScore);
                }
            },

            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                } else {
                    this.startGame();
                }
            },

            movePlayer(dx, dy) {
                if (this.gameRunning && !this.gamePaused) {
                    this.player.x = Math.max(0, Math.min(this.width - this.player.width, this.player.x + dx));
                }
            },

            draw() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Draw grid
                this.ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
                this.ctx.lineWidth = 1;
                for (let i = 0; i < this.width; i += 40) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i, 0);
                    this.ctx.lineTo(i, this.height);
                    this.ctx.stroke();
                }

                // Draw player with glow
                this.ctx.shadowColor = '#00ff00';
                this.ctx.shadowBlur = 20;
                this.ctx.fillStyle = '#00ff00';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                this.ctx.shadowBlur = 0;

                // Draw enemies with glow
                this.ctx.shadowColor = '#ff0080';
                this.ctx.shadowBlur = 15;
                this.ctx.fillStyle = '#ff0080';
                for (let enemy of this.enemies) {
                    this.ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                }
                this.ctx.shadowBlur = 0;

                // Draw power-ups
                this.ctx.shadowColor = '#ffff00';
                this.ctx.shadowBlur = 20;
                this.ctx.fillStyle = '#ffff00';
                for (let pu of this.powerUps) {
                    this.ctx.fillRect(pu.x, pu.y, pu.width, pu.height);
                }
                this.ctx.shadowBlur = 0;

                // Draw particles
                this.ctx.fillStyle = '#00ff00';
                for (let p of this.particles) {
                    this.ctx.fillRect(p.x, p.y, 3, 3);
                }

                // Score
                this.ctx.fillStyle = '#00ff00';
                this.ctx.font = 'bold 20px monospace';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`Score: ${this.score}`, 10, 30);
                this.ctx.fillText(`Level: ${this.level}`, 10, 55);
                this.ctx.fillText(`Lives: ${this.lives}`, 10, 80);
                this.ctx.fillText(`Best: ${this.highScore}`, 10, 105);

                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#00ffff';
                    this.ctx.font = 'bold 24px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('PAUSED', this.width / 2, this.height / 2);
                }

                if (this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                    this.ctx.fillStyle = '#ff0080';
                    this.ctx.font = 'bold 24px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('GAME OVER', this.width / 2, this.height / 2 - 50);
                    this.ctx.font = '16px monospace';
                    this.ctx.fillText(`Final Score: ${this.score}`, this.width / 2, this.height / 2);
                    this.ctx.fillText(`Level Reached: ${this.level}`, this.width / 2, this.height / 2 + 30);
                    this.ctx.fillText(`Best Score: ${this.highScore}`, this.width / 2, this.height / 2 + 60);
                }

                document.getElementById('score').textContent = this.score;
            },

            setupInput() {
                let keys = {};
                document.addEventListener('keydown', (e) => {
                    keys[e.key] = true;
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                    }
                });
                document.addEventListener('keyup', (e) => {
                    keys[e.key] = false;
                });

                const checkKeys = () => {
                    if (keys['ArrowLeft']) this.movePlayer(-this.player.speed, 0);
                    if (keys['ArrowRight']) this.movePlayer(this.player.speed, 0);
                };

                setInterval(checkKeys, 30);
            },

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        game.init();
    </script>
</body>
</html>
